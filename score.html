<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Score</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.10/dist/umd/supabase.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }
    
    #scoreDate {
      margin: 4px 0 16px;
      color: #000000;
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
    }

    #scoreList {
      display: flex;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: nowrap;
      overflow-x: hidden;
    }

    .score-row {
      flex: 1;
      min-width: 140px;
      opacity: 0;
      transform: scale(0.9) translateY(8px);
      transition: 0.45s ease;
      border-bottom: none;
      padding: 12px;
    }

    .score-row.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .city {
      font-size: 20px;
      font-weight: 600;
    }

    .msg {
      font-size: 16px;
      margin-top: 4px;
    }

    .detail {
      font-size: 18px;
      margin-top: 6px;
      line-height: 1.5;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-label {
      flex: 0 0 110px;
      white-space: nowrap;
    }

    .coin, .mood {
      margin-top: 6px;
      font-weight: 600;
    }

    .missing {
      opacity: 0.75;
    }

    #stats {
      margin-bottom: 16px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .stat-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      width: 100%;
      flex-wrap: wrap;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    #cityCircles {
      margin-top: 0;
      margin-bottom: 24px;
      width: 100%;
      min-height: 34px;
      font-size: 1.5rem;
      line-height: 1.2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }
    
    button {
      padding: 10px 16px;
      font-size: 22px;
      cursor: pointer;
    }

    #scoreErrorBanner {
      margin-top: 10px;
      color: #b91c1c;
      min-height: 20px;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      body {
        padding: 14px 12px;
      }

      .city {
        font-size: 18px;
      }

      .detail {
        font-size: 15px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a href="index.html">
    <button> ← Back </button>
  </a>

  <h1> My Score </h1>
  <p id="scoreDate"></p>

  <div id="scoreList"></div>

  <div id="stats">
    <div class="stat-item">🪙 <span id="coinTotal">0</span></div>
    <div class="stat-row">
      <div class="stat-item">💗 <span id="moodTotal">0</span></div>
      <div class="stat-item">⭐ <span id="currentStreak">0</span></div>
    </div>
  </div>

  <div id="cityCircles"> ⚪ ⚪ ⚪ </div>
  <button id="shareBtn"> Share </button>
  <div id="scoreErrorBanner"></div>

  <script>
    const SUPABASE_URL = "https://ckyqknlxmjqlkqnxhgef.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0";
    
    if (!SUPABASE_ANON_KEY) {
      console.error("Missing Supabase anon key.");
    }

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      global: {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
      },
    });

    const userId = localStorage.getItem("temps_user_id");
    const GAME_TZ = "America/Los_Angeles";

    const MONTH_NAMES = [
      "January","February","March","April","May","June",
      "July","August","September","October","November","December"
    ];

    function ymdToShift(ymd, deltaDays) {
      const [y, m, d] = ymd.split("-").map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      dt.setUTCDate(dt.getUTCDate() + deltaDays);

      const yy = dt.getUTCFullYear();
      const mm = String(dt.getUTCMonth() + 1).padStart(2, "0");
      const dd = String(dt.getUTCDate()).padStart(2, "0");
      return `${yy}-${mm}-${dd}`;
    }

    function dateLabelFromYMD(ymd) {
      const [, m, d] = ymd.split("-");
      return `${MONTH_NAMES[Number(m) - 1]} ${Number(d)}`;
    }

    const todayInGameTz = new Intl.DateTimeFormat("en-CA", {
      timeZone: GAME_TZ,
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
    }).format(new Date());

    const ydayDate = ymdToShift(todayInGameTz, -1);
    const ydayLabel = dateLabelFromYMD(ydayDate);
    document.getElementById("scoreDate").textContent = ydayLabel;

    const CITY_BY_ID = {
      1: "Los Angeles",
      2: "Austin",
      3: "New York City"
    };

    const CITY_ORDER = Object.keys(CITY_BY_ID)
      .map((id) => Number(id))
      .sort((a, b) => a - b);

    let cityCircleString = "⚪ ⚪ ⚪";

    function cityCirclesFromScores(scores) {
      return CITY_ORDER
        .map((id) => {
          const row = scores.find((r) => Number(r.city_id) === id);
          return resultCircle(row || {});
        })
        .join(" ");
    }

    function renderCityCircles(scores) {
      cityCircleString = cityCirclesFromScores(scores || []);
      const el = document.getElementById("cityCircles");
      if (el) el.textContent = cityCircleString;
    }

    let totalCoins = 0;
    let totalMood = 0;
    let currentStreak = 0;

    function showBanner(message, isError = false) {
      const banner = document.getElementById("scoreErrorBanner");
      if (!banner) return;
      banner.textContent = message || "";
      banner.style.color = isError ? "#b91c1c" : "#166534";
      if (message) {
        setTimeout(() => (banner.textContent = ""), 5000);
      }
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateNumber(elementId, target, duration = 800) {
      const el = document.getElementById(elementId);
      const startTime = performance.now();
      const safeTarget = Number(target) || 0;

      function update(now) {
        const rawProgress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(rawProgress);
        const value = Math.floor(eased * safeTarget);
        el.textContent = value;

        if (rawProgress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = safeTarget;
          el.style.transform = "scale(1.2)";
          setTimeout(() => (el.style.transform = "scale(1)"), 125);
        }
      }

      requestAnimationFrame(update);
    }

    function formatSignedNumber(v) {
      if (v === null || v === undefined || v === "" || Number.isNaN(Number(v))) {
        return "—";
      }
      const n = Math.round(Number(v));
      return `${n > 0 ? "+" : ""}${n}`;
    }

    function animateSignedNumber(elementId, target, duration = 800) {
      const el = document.getElementById(elementId);
      const startTime = performance.now();
      const safeTarget = Number(target) || 0;

      function update(now) {
        const rawProgress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(rawProgress);
        const value = safeTarget * eased;
        el.textContent = formatSignedNumber(value);

        if (rawProgress < 1) requestAnimationFrame(update);
        else {
          el.textContent = formatSignedNumber(safeTarget);
          el.style.transform = "scale(1.2)";
          setTimeout(() => (el.style.transform = "scale(1)"), 125);
        }
      }

      requestAnimationFrame(update);
    }

    function format(v) {
      if (v === null || v === undefined || v === "" || Number.isNaN(Number(v))) {
        return "—";
      }
      return `${Math.abs(Math.round(Number(v)))}`;
    }

    function cityDisplay(row) {
      if (row.city && String(row.city).trim()) return String(row.city).trim();
      if (row.city_id !== null && row.city_id !== undefined) {
        return CITY_BY_ID[row.city_id] || CITY_BY_ID[String(row.city_id)] || `City ${row.city_id}`;
      }
      return "Unknown City";
    }

    function hasForecast(row) {
      return row.forecast_high != null && row.forecast_low != null;
    }

    function resultCircle(row) {
      if (!row || !hasForecast(row)) return "⚪";
      const errorHigh = Number(row.error_high);
      if (!Number.isFinite(errorHigh)) return "⚪";

      const e = Math.abs(Math.round(errorHigh));
      if (e <= 1) return "🟢";
      if (e <= 3) return "🟡";
      return "🔴";
    }

    async function checkAuth() {
      const { error } = await client
        .from("daily_scores")
        .select("id", { head: true, count: "exact" })
        .limit(1);

      if (error) {
        console.error("Auth probe failed:", error);
        showBanner(`Auth probe failed: ${error.message}`, true);
        return false;
      }

      console.log("Auth probe OK.");
      return true;
    }

    async function loadScore() {
      console.log("User ID:", userId);
      console.log("Yesterday's Date:", ydayDate);

      if (!userId) {
        document.getElementById("scoreList").innerHTML = "<p>No user found. Please make a forecast.</p>";
        return;
      }

      const { data: scores, error: scoreError } = await client
        .from("daily_scores")
        .select("*")
        .eq("user_id", userId)
        .eq("date", ydayDate)
        .order("city_id");

      if (scoreError) {
        console.error("Score Fetch Error:", scoreError);
        document.getElementById("scoreList").innerHTML = "<p>Could not load scores.</p>";
        showBanner(`Could not load scores: ${scoreError.message || "Unknown error"}`, true);
        return;
      }

      let { data: userStats, error: statsError } = await client
        .from("user_stats")
        .select("current_streak")
        .eq("user_id", userId)
        .maybeSingle();

      if (statsError) {
        console.error("User Stats Fetch Error:", statsError);
      }

      if (!userStats) {
        console.log("Creating user_stats for:", userId);
        const { error: upsertError } = await client.from("user_stats").upsert(
          {
            user_id: userId,
            current_streak: 0
          },
          { onConflict: "user_id" }
        );

        if (upsertError) {
          console.error("user_stats upsert Error:", upsertError);
        }
        currentStreak = 0;
      } else {
        currentStreak = userStats.current_streak || 0;
      }

      if (!scores || scores.length === 0) {
        document.getElementById("scoreList").innerHTML = "<p>No score yet.</p>";
        renderCityCircles([]);
        animateNumber("coinTotal", 0, 800);
        animateSignedNumber("moodTotal", 0, 800);
        animateNumber("currentStreak", currentStreak, 800);
        return;
      }

      const list = document.getElementById("scoreList");
      list.innerHTML = "";
      totalCoins = 0;
      totalMood = 0;

      scores.forEach((s) => {
        const forecasted = hasForecast(s);

        if (forecasted) {
          totalCoins += Number(s.coins || 0);
          totalMood += Number(s.mood || 0);
        }

        const icon = resultCircle(s);
        const detailHtml = forecasted
          ? `
              My Forecasts: &nbsp;&nbsp; H ${s.forecast_high}° / L ${s.forecast_low}°
              <br />
              Actual Temps: &nbsp;&nbsp; H ${s.actual_high}° / L ${s.actual_low}°
              <br />
              Accuracy (Error): &nbsp;&nbsp; H ${format(s.error_high)}° / L ${format(s.error_low)}°
            `
          : `No forecasts submitted for yesterday`;

        const coinText = forecasted ? `🪙 +${Number(s.coins || 0)}` : `🪙 +0`;
        const moodText = forecasted ? `💗 ${formatSignedNumber(s.mood)}` : `💗 —`;
        const rowClass = forecasted ? "score-row" : "score-row missing";

        const row = document.createElement("div");
        row.className = rowClass;
        row.innerHTML = `
          <div class="city">${icon} ${cityDisplay(s)}</div>
          <div class="msg">${s.message || (forecasted ? "" : "No submission")}</div>
          <div class="detail">${detailHtml}</div>
          <div class="coin">${coinText}</div>
          <div class="mood">${moodText}</div>
        `;
        list.appendChild(row);
      });

      renderCityCircles(scores);
      document.getElementById("coinTotal").textContent = "0";
      document.getElementById("moodTotal").textContent = "0";
      document.getElementById("currentStreak").textContent = "0";
      revealRows(scores.length);
      buildShare(scores, totalCoins, totalMood, currentStreak);
    }

    function revealRows(rowCount) {
      const rows = document.querySelectorAll(".score-row");

      rows.forEach((row, i) => {
        setTimeout(() => {
          row.classList.add("visible");
        }, i * 300);
      });

      setTimeout(() => {
        animateNumber("coinTotal", totalCoins, 800);
        animateSignedNumber("moodTotal", totalMood, 800);
        animateNumber("currentStreak", currentStreak, 800);
      }, rowCount * 300);
    }

    function showShareStatus(msg, type = "ok") {
      let status = document.getElementById("shareStatus");
      if (!status) {
        status = document.createElement("div");
        status.id = "shareStatus";
        status.style.marginTop = "8px";
        status.style.fontSize = "13px";
        status.style.minHeight = "18px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", status);
      }
      status.style.color = type === "error" ? "#b91c1c" : "#166534";
      status.textContent = msg;
      clearTimeout(window.__shareTimer);
      window.__shareTimer = setTimeout(() => (status.textContent = ""), 2000);
    }

    function showManualShareFallback(text) {
      let box = document.getElementById("manualShareBox");
      if (!box) {
        box = document.createElement("textarea");
        box.id = "manualShareBox";
        box.setAttribute("readonly", "");
        box.style.width = "100%";
        box.style.minHeight = "110px";
        box.style.marginTop = "10px";
        box.style.padding = "8px";
        box.style.fontFamily = "inherit";
        box.style.fontSize = "14px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", box);
      }
      box.value = text;
      box.style.display = "block";
      box.focus();
      box.select();
    }

    async function copyText(text) {
      if (window.isSecureContext && navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (e) {
          console.warn("Clipboard API failed:", e);
        }
      }

      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        if (ok) return true;
      } catch (e) {
        console.warn("execCommand fallback failed:", e);
      }

      return false;
    }

    function buildShare(scores, totalCoins, totalMood, currentStreak) {
      const btn = document.getElementById("shareBtn");
    
      btn.onclick = async () => {
        const circles = cityCirclesFromScores(scores || []);
        const gameDate = ydayLabel;
    
        const text = `Temps with Friends — ${gameDate}\n${circles}\n🪙 ${totalCoins}\n💗 ${formatSignedNumber(totalMood)}\n⭐ ${currentStreak}`;
    
        const ok = await copyText(text);
        if (ok) {
          showShareStatus("✅ Score copied!");
        } else {
          showShareStatus("⚠️ Clipboard is blocked here. Use text box below.", "error");
          showManualShareFallback(text);
        }
      };
    }

    (async () => {
      const ok = await checkAuth();
      if (ok) {
        loadScore();
      } else {
        document.getElementById("scoreList").innerHTML =
          "<p>Could not connect. Check your Supabase key/project settings.</p>";
      }
    })();
  </script>
</body>
</html>
