<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Score</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

     #scoreList {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap; /* optional for responsiveness */
    }
    
    .score-row {
    flex: 1; /* all take equal space */
    min-width: 140px;
    opacity: 0;
    transform: scale(0.9) translateY(8px);
    transition: 0.45s ease;
    border-bottom: none;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 12px;
    }

    .score-row.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .city {
      font-size: 20px;
      font-weight: 600;
    }

    .msg {
      font-size: 14px;
      margin-top: 4px;
    }

    .detail {
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.4;
    }

    .coin {
      margin-top: 6px;
      font-weight: 600;
    }

    .missing {
      opacity: 0.75;
    }

    #total {
      margin-top: 18px;
      font-size: 20px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #stats {
      margin-top: 6px;
    }

    button {
      padding: 10px 16px;
      margin-top: 14px;
      font-size: 14px;
      cursor: pointer;
    }

    @media (max-width: 500px) {
      body {
        padding: 14px 12px;
      }

      .city {
        font-size: 18px;
      }

      #total {
        font-size: 18px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a href="index.html">
    <button>← Back</button>
  </a>

  <h1>Your Score</h1>

  <div id="scoreList"></div>

  <div id="total">🪙 <span id="coinTotal">0</span></div>

  <div id="stats">
    ⭐ <span id="streakTotal">0</span>
  </div>

  <button id="shareBtn">Share Score</button>

  <script>
    const SUPABASE_URL = "https://ckyqknlxmjqlkqnxhgef.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0";

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const userId = localStorage.getItem("temps_user_id");
    const ydayDate = new Date(Date.now() - 86400000).toISOString().split("T")[0];

    // keep city IDs in DB from west to east for graphic
    const CITY_ORDER = [
      { id: 1, name: "Los Angeles" },
      { id: 2, name: "Austin" },
      { id: 3, name: "New York City" }
    ];

    const CITY_BY_ID = { // local city map
      1: "New York City",
      2: "Los Angeles",
      3: "Austin"
    };

    let totalCoins = 0;
    let streak = 0;

    function animateNumber(elementId, target, duration = 600) {
      const el = document.getElementById(elementId);
      const start = 0;
      const startTime = performance.now();

      function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const value = Math.floor(progress * target);
        el.textContent = value;

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = target;
          el.style.transform = "scale(1.2)";
          setTimeout(() => (el.style.transform = "scale(1)"), 125);
        }
      }

      requestAnimationFrame(update);
    }

    function normalize(v) {
      return String(v ?? "").trim().toLowerCase();
    }

    function cityDisplay(row) {
      if (row.city && String(row.city).trim()) return String(row.city).trim();
      if (row.city_id !== null && row.city_id !== undefined) {
        return CITY_BY_ID[row.city_id] || CITY_BY_ID[String(row.city_id)] || `City ${row.city_id}`;
      }
      return "Unknown City";
    }

    function rowMatchesCity(row, cityCfg) {
      return (
        // normalize(row.city) === normalize(cityCfg.name) ||
        String(row.city_id ?? "") === String(cityCfg.id)
      );
    }

    function uniqueKey(row) {
      return row.id || `${row.user_id}-${row.date}-${row.city_id}-${row.hour || ""}`;
    }

    function orderedScores(scores) {
      const used = new Set();
      const ordered = [];

      CITY_ORDER.forEach((cityCfg) => {
        const found = scores.find((r) => rowMatchesCity(r, cityCfg) && !used.has(uniqueKey(r)));
        if (found) {
          ordered.push(found);
          used.add(uniqueKey(found));
        }
      });

      scores.forEach((r) => {
        if (!used.has(uniqueKey(r))) ordered.push(r);
      });

      return ordered;
    }

    function hasForecast(row) {
      return row.forecast_high != null && row.forecast_low != null;
    }

    function resultCircle(row) {
      if (!hasForecast(row)) return "⚪";

      const err = Math.max(
        Number(row.error_high ?? Number.POSITIVE_INFINITY),
        Number(row.error_low ?? Number.POSITIVE_INFINITY)
      );

      if (err <= 1) return "🟢";
      if (err <= 3) return "🟡";
      return "🔴";
    }

    async function loadScore() {
      console.log("User ID:", userId);
      console.log("Yesterday's Date:", ydayDate);

      if (!userId) {
        document.getElementById("scoreList").innerHTML = "<p>No user found. Please make a forecast.</p>";
        return;
      }

      // fixed undefined error variable
      const { data: scores, error: scoreError } = await client
        .from("daily_scores")
        .select("*")
        .eq("user_id", userId)
        .eq("date", ydayDate)
        .order("city_id");

      if (scoreError) {
        console.error("Score Fetch Error:", scoreError);
        document.getElementById("scoreList").innerHTML = "<p>Could not load scores.</p>";
        return;
      }

      // robust user_stats handling
      let { data: userStats, error: statsError } = await client
        .from("user_stats")
        .select("current_streak, current_coins, mood")
        .eq("user_id", userId)
        .maybeSingle();

      if (statsError) {
        console.error("User Stats Fetch Error:", statsError);
      }

      if (!userStats) {
        console.log("Creating user_stats for:", userId);
        const { error: upsertError } = await client.from("user_stats").upsert(
          {
            user_id: userId,
            current_streak: 0,
            current_coins: 0,
            mood: 0
          },
          { onConflict: "user_id" }
        );

        if (upsertError) {
          console.error("user_stats upsert Error:", upsertError);
        }
        streak = 0;
      } else {
        streak = userStats.current_streak || 0;
      }

      if (!scores || scores.length === 0) {
        document.getElementById("scoreList").innerHTML = "<p>No score yet.</p>";
        animateNumber("coinTotal", 0, 600);
        animateNumber("streakTotal", streak, 600);
        document.getElementById("total").style.opacity = 1;
        return;
      }

      const list = document.getElementById("scoreList");
      list.innerHTML = "";
      totalCoins = 0;

      const rows = orderedScores(scores);

      rows.forEach((s) => {
        const forecasted = hasForecast(s);

        if (forecasted) {
          totalCoins += Number(s.coins || 0);
        }

        const icon = resultCircle(s);
        const detailHtml = forecasted
          ? `
              H ${s.forecast_high} / L ${s.forecast_low}
              <br />
              Actual: H ${s.actual_high} / L ${s.actual_low}
              <br />
              Error: ${Math.max(s.error_high || 0, s.error_low || 0)}°
            `
          : `No forecast submitted for yesterday`;

        const coinText = forecasted ? `🪙 +${Number(s.coins || 0)}` : `🪙 +0`;
        const rowClass = forecasted ? "score-row" : "score-row missing";

        const row = document.createElement("div");
        row.className = rowClass;
        row.innerHTML = `
          <div class="city">${icon} ${cityDisplay(s)}</div>
          <div class="msg">${s.message || (forecasted ? "" : "No submission")}</div>
          <div class="detail">${detailHtml}</div>
          <div class="coin">${coinText}</div>
        `;
        list.appendChild(row);
      });

      document.getElementById("coinTotal").textContent = "0";
      document.getElementById("streakTotal").textContent = "0";
      revealRows(rows.length);
      buildShare(rows, totalCoins, streak);
    }

    function revealRows(rowCount) {
      const rows = document.querySelectorAll(".score-row");

      rows.forEach((row, i) => {
        setTimeout(() => {
          row.classList.add("visible");
        }, i * 300);
      });

      setTimeout(() => {
        animateNumber("coinTotal", totalCoins, 600);
        animateNumber("streakTotal", streak, 600);
      }, rowCount * 300);

      setTimeout(() => {
        document.getElementById("total").style.opacity = 1;
      }, rowCount * 600);
    }

    function showShareStatus(msg, type = "ok") {
      let status = document.getElementById("shareStatus");
      if (!status) {
        status = document.createElement("div");
        status.id = "shareStatus";
        status.style.marginTop = "8px";
        status.style.fontSize = "13px";
        status.style.minHeight = "18px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", status);
      }
      status.style.color = type === "error" ? "#b91c1c" : "#166534";
      status.textContent = msg;
      clearTimeout(window.__shareTimer);
      window.__shareTimer = setTimeout(() => (status.textContent = ""), 2000);
    }

    function showManualShareFallback(text) {
      let box = document.getElementById("manualShareBox");
      if (!box) {
        box = document.createElement("textarea");
        box.id = "manualShareBox";
        box.setAttribute("readonly", "");
        box.style.width = "100%";
        box.style.minHeight = "110px";
        box.style.marginTop = "10px";
        box.style.padding = "8px";
        box.style.fontFamily = "inherit";
        box.style.fontSize = "14px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", box);
      }
      box.value = text;
      box.style.display = "block";
      box.focus();
      box.select();
    }

    async function copyText(text) {
      // try modern clipboard API first for secure contexts
      if (window.isSecureContext && navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (e) {
          console.warn("Clipboard API failed:", e);
        }
      }

      try { // failsafe legacy execCommand
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        if (ok) return true;
      } catch (e) {
        console.warn("execCommand fallback failed:", e);
      }
    
      return false;
    }

    function buildShare(scores, totalCoins, streak) {
      const btn = document.getElementById("shareBtn");
    
      btn.onclick = async () => {
        const circles = CITY_ORDER.map((cityCfg) => {
          const row = scores.find((r) => rowMatchesCity(r, cityCfg));
          return resultCircle(row || {});
        }).join(" ");
    
        const gameDate = new Date(Date.now() - 86400000).toLocaleDateString("en-US", {
          month: "short",
          day: "numeric"
        });
    
        const text =
          `Temps with Friends — ${gameDate}\n${circles}\n🪙 ${totalCoins}\n⭐ ${streak}`;
    
        const ok = await copyText(text);
        if (ok) {
          showShareStatus("✅ Score copied");
        } else {
          showShareStatus("⚠️ Clipboard is blocked here. Use the text box below.", "error");
          showManualShareFallback(text);
        }
      };
    }

    loadScore();
  </script>
</body>
</html>
