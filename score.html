<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> My Score </title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.10/dist/umd/supabase.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }
    
    #scoreDate {
      margin: 4px 0 16px;
      color: #000000;
      font-size: 2rem;
      font-weight: 600;
      text-align: center;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
    }

    #scoreList {
      width: 100%;
    }
    
    #scoreList:not(.is-hourly) {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: visible;
      align-items: flex-start;
    }
    
    #scoreList.is-hourly {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      overflow: visible;
      justify-content: stretch;
    }

    .score-row {
      flex: 1 1 0;
      min-width: 0;
      opacity: 0;
      transform: scale(0.9) translateY(8px);
      transition: 0.45s ease;
      border-bottom: none;
      padding: 10px 6px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .score-row.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .page-controls{
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    
    .menu-btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      min-width: 140px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 700;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      color: #111827;
      text-decoration: none;
      box-sizing: border-box;
      text-align: center;
      white-space: nowrap;
    }
    
    .menu-btn:hover {
      filter: brightness(0.98);
    }
    
    .top-nav{
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: center;
    }

    .top-nav .menu-btn {
      background: #a78bfa;      /* cozy purple */
      border-color: #8b5cf6;
      color: #ffffff;
      font-weight: 700;
    }

    .top-nav .menu-btn:hover {
      background: #8b5cf6;
    }

    .mode-switch-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }

    .mode-switch {
      display: inline-flex;
      align-items: stretch;
      background: #e5e7eb;
      border: 1px solid #cbd5e1;
      border-radius: 9999px;
      padding: 3px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      width: 100%;
      max-width: 260px;
    }

    .mode-switch-btn {
      flex: 1 1 0;
      min-width: 0;
      height: 34px;
      border: 0;
      border-radius: 9999px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 700;
      background: transparent;
      color: #334155;
      text-align: center;
      cursor: pointer;
    }

    .mode-switch-btn:hover {
      filter: brightness(0.98);
    }

    .mode-switch-btn.active {
      background: #f8fafc;
      color: #0f172a;
      border: 1px solid #94a3b8;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.85);
    }

    .back-btn {
      background: #93c5fd;      /* cozy blue */
      border-color: #60a5fa;
      color: #1e3a8a;
      font-weight: 700;
    }

    .back-btn:hover {
      background: #60a5fa;
      color: #1e40af;
    }

    .city-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      text-align: center;
    }

    .result-circle {
      font-size: 1.4rem;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .city {
      font-size: clamp(16px, 2.9vw, 18px); /* 16 → 18px responsive */
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: visible;   /* no ellipsis/truncation */
      text-overflow: clip;
      line-height: 1.2;
    }

    .hourly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    
    .hourly-card {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      overflow: hidden;
      min-width: 0;
    }
    
    .hour-label { font-weight: 700; margin-bottom: 6px; color: #111827; }
    .hourly-sub { font-size: 0.9rem; line-height: 1.35; color: #374151; }
    .hourly-empty { color: #6b7280; }

    .msg {
      font-size: 16px;
      margin-top: 4px;
      text-align: center;
      width: 100%;
    }

    .detail {
      font-size: 18px;
      margin-top: 6px;
      line-height: 1.5;
      white-space: normal;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .detail-line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: normal;
      flex-wrap: wrap;
      width: 100%;
      overflow-wrap: anywhere;
    }

    .detail-label {
      flex: 0 0 110px;
      white-space: nowrap;
    }

    .coin, .mood {
      margin-top: 8px;
      font-weight: 600;
      width: 100%;
      text-align: center;
    }

    .missing {
      opacity: 0.75;
    }

    #stats {
      margin-top: 32px;
      margin-bottom: 32px;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .stat-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      width: 100%;
      flex-wrap: wrap;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    #cityCircles {
      margin-bottom: 32px;
      width: 100%;
      min-height: 34px;
      font-size: 1.5rem;
      line-height: 1.2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }
    
    button {
      padding: 10px 16px;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      border: 1px solid transparent;
      color: #14532d;
      letter-spacing: 0.2px;
    }

    #shareBtn {
      background: #86efac;       /* cozy green */
      border-color: #4ade80;
      color: #14532d;
    }

    #shareBtn:hover {
      background: #6ee7b7;
    }

    #scoreErrorBanner {
      margin-top: 10px;
      color: #b91c1c;
      min-height: 20px;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      body {
        padding: 14px 12px;
      }
      
      .city {
        font-size: 16px;
        white-space: normal;
      }
    
      .detail {
        font-size: 15px;
        text-align: center;
      }

      .menu-btn {
        font-size: 14px;
        padding: 0 6px;
      }
      
      button {
        width: 100%;
        font-size: 22px;
      }
      #scoreList {
        gap: 6px;
      }

      .score-row {
        padding: 10px 4px;
      }

      #scoreList.is-hourly {
        display: block;
        width: 100%;
      }
      
      .hourly-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
      }
      
      .hourly-hour-group {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      
      .hourly-hour-label {
        flex: 0 0 110px;
        min-width: 90px;
        font-weight: 600;
        font-size: 1.125rem;
        color: #0f172a;
        text-align: center;
        padding-top: 9px;
        white-space: nowrap;
      }
      
      .hourly-table-wrap {
        flex: 1 1 auto;
        min-width: 0;
        overflow-x: auto;
      }
      
      .hourly-inline-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      
      .hourly-inline-table th,
      .hourly-inline-table td {
        padding: 8px 6px;
        white-space: nowrap;
        border-bottom: 1px solid #f0f0f0;
        text-align: right;
      }
      
      .hourly-inline-table th:first-child,
      .hourly-inline-table td:first-child {
        text-align: left;
      }
      .hourly-inline-table th:first-child {
        width: 35%;
      }
      
      @media (max-width: 700px) {
        .hourly-hour-group {
          flex-direction: column;
          align-items: stretch;
          gap: 16px;
        }
      
        .hourly-hour-label {
          text-align: center;
          padding-top: 0;
          font-weight: 600;
          font-size: 1.2rem;
          margin-bottom: 2px;
        }
      }
    }

    .hourly-hour-label {
      flex: 0 0 110px;
      min-width: 90px;
      font-weight: 600;
      font-size: 1.25rem;
      color: #0f172a;
      text-align: center;
      padding-top: 9px;
      white-space: nowrap;
    }

  </style>
</head>
<body>
  <div class="page-controls">
    <a href="index.html" class="menu-btn back-btn">← Back</a>
  
    <nav class="top-nav">
      <a href="stats.html" class="menu-btn"> My Stats </a>
      <a href="history.html" class="menu-btn"> History </a>
      <a href="leaderboard.html" class="menu-btn"> Leaderboard </a>
      <a href="daily.html" class="menu-btn"> Daily Forecasts </a>
    </nav>
    <div class="mode-switch-wrap">
      <div id="modeSwitch" class="mode-switch" role="tablist" aria-label="Score mode">
        <button id="modeDailyBtn" type="button" class="mode-switch-btn active" aria-pressed="true"> Daily </button>
        <button id="modeHourlyBtn" type="button" class="mode-switch-btn" aria-pressed="false"> Hourly </button>
      </div>
    </div>
  </div>

  <h1> My Score </h1>
  <p id="scoreDate"></p>

  <div id="scoreList"></div>

  <div id="stats">
    <div class="stat-item">🪙 <span id="coinTotal">0</span></div>
    <div class="stat-row">
      <div class="stat-item">💗 <span id="moodTotal">0</span></div>
      <div class="stat-item">⭐ <span id="currentStreak">0</span></div>
    </div>
  </div>

  <div id="cityCircles"> ⚪ ⚪ ⚪ </div>
  <button id="shareBtn"> Share </button>
  <div id="scoreErrorBanner"></div>
  
  <script>
    const SUPABASE_URL = 'https://ckyqknlxmjqlkqnxhgef.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0';
    
    if (!SUPABASE_ANON_KEY) {
      console.error("Missing Supabase anon key.");
    }

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      global: {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
      },
    });

    const userId = localStorage.getItem("temps_user_id");

    const MONTH_NAMES = [
      "Jan", "Feb", "Mar", "Apr", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec"
    ];

    const hasValue = (v) => v !== null && v !== undefined && v !== "";
    
    function getCurrentET() {
      const parts = Object.fromEntries(
        new Intl.DateTimeFormat("en-US", {
          timeZone: "America/New_York",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          hour12: false,
        }).formatToParts(new Date())
          .map(({ type, value }) => [type, value])
      );
    
      return {
        date: `${parts.year}-${parts.month}-${parts.day}`,
        hour: Number(parts.hour),
      };
    }

    function getHourlyWindow() {
      const now = getCurrentET();
      const today = now.date;
      const hour = now.hour;
    
      if (hour >= 13) { // advance to today hourlies
        return {
          startDate: today,
          endDate: today,
          startHour: 13,
          endHour: hour,
        };
      }
    
      return { // still yesterday hourlies
        startDate: ymdToShift(today, -1),
        endDate: today,
        startHour: 13,
        endHour: hour,
      };
    }

    function ymdToShift(ymd, deltaDays) {
      const [y, m, d] = ymd.split("-").map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      dt.setUTCDate(dt.getUTCDate() + deltaDays);

      const yy = dt.getUTCFullYear();
      const mm = String(dt.getUTCMonth() + 1).padStart(2, "0");
      const dd = String(dt.getUTCDate()).padStart(2, "0");
      return `${yy}-${mm}-${dd}`;
    }

    function dateLabelFromYMD(ymd) {
      const parts = String(ymd ?? "").split("-");
      if (parts.length < 3) return "Invalid date";
      const m = Number(parts[1]);
      const d = Number(parts[2]);
      return `${MONTH_NAMES[m - 1] ?? "Invalid"} ${Number.isFinite(d) ? d : ""}`.trim();
    }

    const todayInPT = new Intl.DateTimeFormat("en-CA", {
      timeZone: "America/Los_Angeles",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
    }).format(new Date());

    const ydayDate = ymdToShift(todayInPT, -1);
    const ydayLabel = dateLabelFromYMD(ydayDate);
    document.getElementById("scoreDate").textContent = ydayLabel;

    const CITY_BY_ID = {
      1: "Los Angeles",
      2: "Austin",
      3: "New York City"
    };

    const CITY_ORDER = Object.keys(CITY_BY_ID)
      .map((id) => Number(id))
      .sort((a, b) => a - b);

    let activeMode = "daily";
    const modeDailyBtn = document.getElementById("modeDailyBtn");
    const modeHourlyBtn = document.getElementById("modeHourlyBtn");

    function getInitialMode() {
      const urlMode = new URLSearchParams(window.location.search).get("mode");
      return urlMode === "hourly" ? "hourly" : "daily";
    }

    function getValue(row, keys) {
      for (const key of keys) {
        const v = row?.[key];
        if (v !== null && v !== undefined && v !== "") return v;
      }
      return null;
    }

    function hasHourlyForecast(row) {
      const direct = getValue(row, ["forecast_temp", "forecast", "predicted_temp", "forecast_value", "temp_forecast", "guess", "prediction"]);
      return direct !== null || hasValue(row.forecast);
    }

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = String(value ?? "");
      return div.innerHTML;
    }

    function updateModeUI(mode) {
      const isDaily = mode === "daily";

      if (modeDailyBtn) {
        modeDailyBtn.classList.toggle("active", isDaily);
        modeDailyBtn.setAttribute("aria-pressed", String(isDaily));
      }
      if (modeHourlyBtn) {
        modeHourlyBtn.classList.toggle("active", !isDaily);
        modeHourlyBtn.setAttribute("aria-pressed", String(!isDaily));
      }

      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) shareBtn.style.display = isDaily ? "inline-block" : "none";

      const cityCircles = document.getElementById("cityCircles");
      if (cityCircles) cityCircles.style.display = isDaily ? "flex" : "none";

      const hourlyStatsHide = document.querySelector("#stats .stat-row");
      if (hourlyStatsHide) hourlyStatsHide.style.display = isDaily ? "flex" : "none";
    }

    // render circles for daily only
    function renderCityCircles(scores) {
      const cityCircleString = cityCirclesFromScores(scores || []);
      const el = document.getElementById("cityCircles");
      if (el) el.textContent = cityCircleString;
    }

    function setMode(mode) {
      activeMode = mode === "hourly" ? "hourly" : "daily";
      updateModeUI(activeMode);
      loadScore();
    }

    function cityCirclesFromScores(scores) {
      return CITY_ORDER
        .map((id) => {
          const row = scores.find((r) => Number(r.city_id) === id);
          return resultCircle(row || {});
        })
        .join(" ");
    }

    let totalCoins = 0;
    let totalMood = 0;

    function showBanner(message, isError = false) {
      const banner = document.getElementById("scoreErrorBanner");
      if (!banner) return;
      banner.textContent = message || "";
      banner.style.color = isError ? "#b91c1c" : "#166534";
      if (message) {
        setTimeout(() => (banner.textContent = ""), 5000);
      }
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateNumber(elementId, target, duration = 800) {
      const el = document.getElementById(elementId);
      const startTime = performance.now();
      const safeTarget = Number(target) || 0;

      function update(now) {
        const rawProgress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(rawProgress);
        const value = Math.floor(eased * safeTarget);
        el.textContent = value;

        if (rawProgress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = safeTarget;
          el.style.transform = "scale(1.2)";
          setTimeout(() => (el.style.transform = "scale(1)"), 125);
        }
      }

      requestAnimationFrame(update);
    }

    function formatSignedNumber(v) {
      if (v === null || v === undefined || v === "" || Number.isNaN(Number(v))) {
        return "—";
      }
      const n = Math.round(Number(v));
      return `${n > 0 ? "+" : ""}${n}`;
    }

    function animateSignedNumber(elementId, target, duration = 800) {
      const el = document.getElementById(elementId);
      const startTime = performance.now();
      const safeTarget = Number(target) || 0;

      function update(now) {
        const rawProgress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(rawProgress);
        const value = safeTarget * eased;
        el.textContent = formatSignedNumber(value);

        if (rawProgress < 1) requestAnimationFrame(update);
        else {
          el.textContent = formatSignedNumber(safeTarget);
          el.style.transform = "scale(1.2)";
          setTimeout(() => (el.style.transform = "scale(1)"), 125);
        }
      }

      requestAnimationFrame(update);
    }

    function formatAbs(v) {
      if (v === null || v === undefined || v === "" || Number.isNaN(Number(v))) {
        return "—";
      }
      return `${Math.abs(Math.round(Number(v)))}`;
    }

    function toNumOrDash(v) {
      if (!hasValue(v) || Number.isNaN(Number(v))) return "—";
      return `${Math.round(Number(v))}`;
    }

    function cityDisplay(row) {
      if (row.city && String(row.city).trim()) return String(row.city).trim();
      if (row.city_id !== null && row.city_id !== undefined) {
        return CITY_BY_ID[row.city_id] || CITY_BY_ID[String(row.city_id)] || `City ${row.city_id}`;
      }
      return "Unknown City";
    }

    function hasForecast(row) {
      return row.forecast_high != null || row.forecast_low != null;
    }

    function resultCircle(row) {
      if (!row || !hasForecast(row)) return "⚪";
    
      const errorVal = hasValue(row.error_high) ? row.error_high : row.error_low;
      const errNum = Number(errorVal);
      if (!hasValue(errorVal) || !Number.isFinite(errNum)) return "⚪";
    
      const e = Math.abs(Math.round(errNum));
      if (e <= 1) return "🟢";
      if (e <= 3) return "🟡";
      return "🔴";
    }

    async function checkAuth() {
      const { error } = await client
        .from("daily_scores")
        .select("id", { head: true, count: "exact" })
        .limit(1);

      if (error) {
        console.error("Auth probe failed:", error);
        showBanner(`Auth probe failed: ${error.message}`, true);
        return false;
      }

      console.log("Auth probe OK.");
      return true;
    }

    async function loadScore() {
      const list = document.getElementById("scoreList");
      if (!list) return;
    
      const isHourly = activeMode === "hourly";
      const scoreTable = isHourly ? "hourly_scores" : "daily_scores";
    
      list.classList.toggle("is-hourly", isHourly);
    
      const dateEl = document.getElementById("scoreDate");
      if (dateEl) {
        if (isHourly) {
          const w = getHourlyWindow();
          dateEl.textContent = dateLabelFromYMD(w.startDate) || w.startDate;
        } else {
          dateEl.textContent = ydayLabel;
        }
      }
    
      if (!userId) {
        list.innerHTML = "<p>No user found. Please make a forecast.</p>";
        document.getElementById("coinTotal").textContent = "0";
    
        const moodEl = document.getElementById("moodTotal");
        const streakEl = document.getElementById("currentStreak");
        if (moodEl) moodEl.textContent = "—";
        if (streakEl) streakEl.textContent = "—";
    
        return;
      }
    
      let scoreQuery = client
        .from(scoreTable)
        .select("*")
        .eq("user_id", userId);
    
      if (isHourly) {
        const w = getHourlyWindow();
    
        if (w.startDate === w.endDate) {
          scoreQuery = scoreQuery
            .eq("date", w.startDate)
            .gte("hour", w.startHour)
            .lte("hour", w.endHour);
        } else {
          scoreQuery = scoreQuery.or(
            `and(date.eq.${w.startDate},hour.gte.${w.startHour}),and(date.eq.${w.endDate},hour.lte.${w.endHour})`
          );
        }
    
        scoreQuery = scoreQuery.order("date", { ascending: true })
                               .order("hour", { ascending: true })
                               .order("city_id");
      } else {
        scoreQuery = scoreQuery.eq("date", ydayDate).order("city_id");
      }
    
      const { data: scores, error: scoreError } = await scoreQuery;
      if (scoreError) {
        console.error("Score Fetch Error:", scoreError);
        list.innerHTML = `<p>Could not load ${isHourly ? "hourly" : "daily"} scores.</p>`;
        showBanner(`Could not load ${isHourly ? "hourly" : "daily"} scores: ${scoreError.message || "Unknown error"}`, true);
      
        document.getElementById("coinTotal").textContent = "0";
        document.getElementById("moodTotal").textContent = isHourly ? "—" : "0";
        document.getElementById("currentStreak").textContent = isHourly ? "—" : "0";
      
        return;
      }
    
      let currentStreak = 0;
      if (!isHourly) {
        const { data: userStatsData, error: statsError } = await client
          .from("user_stats")
          .select("current_streak")
          .eq("user_id", userId)
          .maybeSingle();
    
        if (statsError) {
          console.error("User Stats Fetch Error:", statsError);
        } else if (!userStatsData) {
          const { error: upsertError } = await client.from("user_stats").upsert(
            { user_id: userId, current_streak: 0 },
            { onConflict: "user_id" }
          );
          if (upsertError) {
            console.error("user_stats upsert Error:", upsertError);
          }
          currentStreak = 0;
        } else {
          currentStreak = Number(userStatsData.current_streak) || 0;
        }
      }
    
      if (!scores || scores.length === 0) {
        list.innerHTML = `<p>No ${isHourly ? "hourly" : "daily"} score yet. Stay tuned & keep forecasting.</p>`;
    
        if (isHourly) {
          document.getElementById("moodTotal").textContent = "—";
          document.getElementById("currentStreak").textContent = "—";
          document.getElementById("coinTotal").textContent = "0";
          revealRows(0, true, 0, 0, 0);
        } else {
          renderCityCircles([]);
          document.getElementById("coinTotal").textContent = "0";
          document.getElementById("moodTotal").textContent = "0";
          document.getElementById("currentStreak").textContent = String(currentStreak);
          buildShare([], 0, 0, currentStreak);
          revealRows(0, false, currentStreak, 0, 0);
        }
    
        return;
      }
    
      list.innerHTML = "";
      totalCoins = 0;
      totalMood = 0;
    
      if (isHourly) {
        renderHourlyScores(scores);
    
        totalCoins = scores.reduce((sum, s) => {
          return hasHourlyForecast(s) ? sum + Number(s.coins || 0) : sum;
        }, 0);
        totalMood = 0;
    
        const moodEl = document.getElementById("moodTotal");
        const streakEl = document.getElementById("currentStreak");
        if (moodEl) moodEl.textContent = "—";
        if (streakEl) streakEl.textContent = "—";
    
        revealRows(scores.length, true, 0, totalCoins, 0);
        return;
      }
    
      scores.forEach((s) => {
        const row = document.createElement("div");
        row.className = "score-row";
      
        const forecasted = hasForecast(s);
      
        if (forecasted) {
          totalCoins += Number(s.coins || 0);
          totalMood += Number(s.mood || 0);
        }
      
        const icon = resultCircle(s);
      
        row.innerHTML = `
          <div class="city-block">
            <div class="result-circle">${escapeHtml(icon)}</div>
            <div class="city">${escapeHtml(cityDisplay(s))}</div>
          </div>
          <div class="msg">${escapeHtml(s.message || (forecasted ? "" : "No submission"))}</div>
          <div class="detail"></div>
          <div class="coin">${escapeHtml(forecasted ? `🪙 +${Number(s.coins || 0)}` : "🪙 +0")}</div>
          <div class="mood">${escapeHtml(forecasted ? `💗 ${formatSignedNumber(s.mood)}` : "💗 —")}</div>
        `;
      
        const detail = row.querySelector(".detail");
        if (forecasted) {
          const lines = [
            "My Forecasts:",
            `H ${toNumOrDash(s.forecast_high)}° / L ${toNumOrDash(s.forecast_low)}°`,
            "Actual Temps:",
            `H ${toNumOrDash(s.actual_high)}° / L ${toNumOrDash(s.actual_low)}°`,
            "Accuracy (Error):",
            `H ${formatAbs(s.error_high)}° / L ${formatAbs(s.error_low)}°`,
          ];
          lines.forEach((line) => {
            const lineEl = document.createElement("div");
            lineEl.className = "detail-line";
            lineEl.textContent = line;
            detail.appendChild(lineEl);
          });
        } else {
          const lineEl = document.createElement("div");
          lineEl.className = "detail-line";
          lineEl.textContent = "No forecasts submitted for yesterday";
          detail.appendChild(lineEl);
        }
      
        list.appendChild(row);
      });
    
      renderCityCircles(scores);
      buildShare(scores, totalCoins, totalMood, currentStreak);
      revealRows(scores.length, false, currentStreak, totalCoins, totalMood);
    }
    
    function revealRows(rowCount, isHourlyMode, streakValue = 0, coins = 0, mood = 0) {
      const rows = document.querySelectorAll(".score-row");
    
      rows.forEach((row, i) => {
        setTimeout(() => row.classList.add("visible"), i * 300);
      });
    
      setTimeout(() => {
        animateNumber("coinTotal", coins, 800);
    
        if (isHourlyMode) { // lock hourly UI values
          const moodEl = document.getElementById("moodTotal");
          const streakEl = document.getElementById("currentStreak");
          if (moodEl) moodEl.textContent = "—";
          if (streakEl) streakEl.textContent = "—";
          return;
        }
    
        animateSignedNumber("moodTotal", mood, 800); // daily only
        animateNumber("currentStreak", streakValue, 800);
      }, rowCount * 300);
    }

    function renderHourlyScores(items = []) {
      const container = document.getElementById("scoreList");
      if (!container) return;
    
      container.innerHTML = "";
    
      if (!items.length) {
        container.innerHTML = '<p class="hourly-empty">No hourly scores yet.</p>';
        return;
      }
    
      const parseHour = (value) => {
        if (value === null || value === undefined) return null;
        const s = String(value).trim();
    
        let m = s.match(/^(\d{1,2})(?:[:.]\d{1,2})?$/);
        if (m) return Number(m[1]);
    
        m = s.match(/^(\d{1,2})(?::\d{1,2})?\s*(AM|PM)\s*$/i);
        if (m) {
          let h = Number(m[1]);
          const pm = m[2].toUpperCase() === "PM";
          if (pm && h !== 12) h += 12;
          if (!pm && h === 12) h = 0;
          return h;
        }
    
        return null;
      };
    
      const formatHour = (h) => {
        if (h === null || h === undefined || !Number.isFinite(Number(h))) return "-";
        const n = Number(h);
        const display = (n % 12) || 12;
        const suffix = n >= 12 ? "PM" : "AM";
        return `${display}:00 ${suffix} ET`;
      };
    
      const parseDateValue = (row) => {
        const raw = row.date ?? row.forecast_date ?? row.day ?? row.timestamp ?? "";
        if (!raw) return null;
    
        const s = String(raw);
        const m = s.match(/^(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];
    
        const d = new Date(s);
        if (Number.isNaN(d.getTime())) return null;
    
        return d.toLocaleDateString("en-CA", {
          timeZone: "America/New_York",
        });
      };
    
      const dateTimeMs = (row) => {
        const ymd = parseDateValue(row);
        const h = parseHour(row.hour);
        if (!ymd || h === null) return Number.POSITIVE_INFINITY;
        const d = new Date(`${ymd}T${String(h).padStart(2, "0")}:00:00`);
        return Number.isNaN(d.getTime()) ? Number.POSITIVE_INFINITY : d.getTime();
      };
    
      const sorted = [...items].sort((a, b) => {
        const dtA = dateTimeMs(a);
        const dtB = dateTimeMs(b);
        if (dtA !== dtB) return dtA - dtB;
    
        const cA = String(a.city_name ?? a.city_id ?? "").localeCompare(String(b.city_name ?? b.city_id ?? ""));
        if (cA !== 0) return cA;
        return 0;
      });
    
      const groups = new Map();
      sorted.forEach((row) => {
        const day = parseDateValue(row) || "unknown";
        const hNum = parseHour(row.hour);
        const hourKey = hNum === null ? "na" : String(hNum);
        const key = `${day}|${hourKey}`;
    
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });
    
      const groupKeys = [...groups.keys()].sort((a, b) => {
        const [dayA, hA] = a.split("|");
        const [dayB, hB] = b.split("|");
    
        if (dayA !== dayB) {
          if (dayA === "unknown") return 1;
          if (dayB === "unknown") return -1;
          return dayA.localeCompare(dayB);
        }
    
        const ha = hA === "na" ? 9999 : Number(hA);
        const hb = hB === "na" ? 9999 : Number(hB);
        return ha - hb;
      });
    
      const wrapper = document.createElement("div");
      wrapper.className = "hourly-list";
    
      groupKeys.forEach((key) => {
        const rows = groups.get(key) || [];
        if (!rows.length) return;
    
        rows.sort((a, b) => {
          const cA = String(a.city_name ?? a.city_id ?? "");
          const cB = String(b.city_name ?? b.city_id ?? "");
          return cA.localeCompare(cB);
        });
    
        const [, hKey] = key.split("|");
        const hourLabel = hKey === "na" ? "-" : formatHour(Number(hKey));
    
        const groupRow = document.createElement("div");
        groupRow.className = "hourly-hour-group";
    
        const label = document.createElement("div");
        label.className = "hourly-hour-label";
        label.textContent = hourLabel;
    
        const tableWrap = document.createElement("div");
        tableWrap.className = "hourly-table-wrap";
    
        const table = document.createElement("table");
        table.className = "hourly-inline-table";
    
        const thead = document.createElement("thead");
        thead.innerHTML = `
          <tr>
            <th style="text-align:left;padding:8px 6px;border-bottom:1px solid #ddd;">City</th>
            <th style="text-align:right;padding:8px 6px;border-bottom:1px solid #ddd;">Forecast</th>
            <th style="text-align:right;padding:8px 6px;border-bottom:1px solid #ddd;">Actual</th>
            <th style="text-align:right;padding:8px 6px;border-bottom:1px solid #ddd;">Error</th>
            <th style="text-align:right;padding:8px 6px;border-bottom:1px solid #ddd;">Coins</th>
          </tr>
        `;
        table.appendChild(thead);
    
        const tbody = document.createElement("tbody");
    
        rows.forEach((s) => {
          const forecasted = hasHourlyForecast(s);
          const cityName = s.city_name ?? (typeof cityDisplay === "function" ? cityDisplay(s) : String(s.city_id ?? "-"));
    
          const hourlyForecast = getValue(s, ["forecast", "forecast_temp", "predicted_temp", "temp_forecast"]);
          const hourlyActual = getValue(s, ["actual", "actual_temp", "observed_temp"]);
          const hourlyError = getValue(s, ["error", "error_temp", "abs_error", "error_abs"]);
    
          const tr = document.createElement("tr");
          tr.className = forecasted ? "" : "missing";
    
          tr.innerHTML = `
            <td style="text-align:left;padding:8px 6px;">${escapeHtml(cityName)}</td>
            <td style="text-align:right;padding:8px 6px;">${escapeHtml(toNumOrDash(hourlyForecast))}°</td>
            <td style="text-align:right;padding:8px 6px;">${escapeHtml(toNumOrDash(hourlyActual))}°</td>
            <td style="text-align:right;padding:8px 6px;">${escapeHtml(formatAbs(hourlyError))}°</td>
            <td style="text-align:right;padding:8px 6px;">🪙 ${escapeHtml(forecasted ? `+${Number(s.coins || 0)}` : "+0")}</td>
          `;
    
          tbody.appendChild(tr);
        });
    
        table.appendChild(tbody);
        tableWrap.appendChild(table);
        groupRow.appendChild(label);
        groupRow.appendChild(tableWrap);
        wrapper.appendChild(groupRow);
      });
    
      container.appendChild(wrapper);
    }
    
    function showShareStatus(msg, type = "ok") {
      let status = document.getElementById("shareStatus");
      if (!status) {
        status = document.createElement("div");
        status.id = "shareStatus";
        status.style.marginTop = "8px";
        status.style.fontSize = "13px";
        status.style.minHeight = "18px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", status);
      }
      status.style.color = type === "error" ? "#b91c1c" : "#166534";
      status.textContent = msg;
      clearTimeout(window.__shareTimer);
      window.__shareTimer = setTimeout(() => (status.textContent = ""), 2000);
    }

    function showManualShareFallback(text) {
      let box = document.getElementById("manualShareBox");
      if (!box) {
        box = document.createElement("textarea");
        box.id = "manualShareBox";
        box.setAttribute("readonly", "");
        box.style.width = "100%";
        box.style.minHeight = "110px";
        box.style.marginTop = "10px";
        box.style.padding = "8px";
        box.style.fontFamily = "inherit";
        box.style.fontSize = "14px";
        document.getElementById("shareBtn").insertAdjacentElement("afterend", box);
      }
      box.value = text;
      box.style.display = "block";
      box.focus();
      box.select();
    }

    async function copyText(text) {
      if (window.isSecureContext && navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (e) {
          console.warn("Clipboard API failed:", e);
        }
      }

      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        if (ok) return true;
      } catch (e) {
        console.warn("execCommand fallback failed:", e);
      }

      return false;
    }

    function buildShare(scores, totalCoins, totalMood, currentStreak) {
      const btn = document.getElementById("shareBtn");
    
      btn.onclick = async () => {
        const circles = cityCirclesFromScores(scores || []);
        const gameDate = ydayLabel;
    
        const text = `Temps with Friends — ${gameDate}\n${circles}\n🪙 ${totalCoins}\n💗 ${formatSignedNumber(totalMood)}\n⭐ ${currentStreak}`;
    
        const ok = await copyText(text);
        if (ok) {
          showShareStatus("✅ Score copied!");
        } else {
          showShareStatus("⚠️ Clipboard is blocked here. Use text box below.", "error");
          showManualShareFallback(text);
        }
      };
    }

    (async () => {
      const ok = await checkAuth();
      if (!ok) {
        document.getElementById("scoreList").innerHTML =
          "<p>Could not connect. Check your Supabase key/project settings.</p>";
        return;
      }
    
      if (modeDailyBtn) modeDailyBtn.addEventListener("click", () => setMode("daily")); // bind controls first
      if (modeHourlyBtn) modeHourlyBtn.addEventListener("click", () => setMode("hourly"));
    
      setMode(getInitialMode());
    })();
  </script>
