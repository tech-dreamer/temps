<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Score</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.10/dist/umd/supabase.min.js"></script>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }

    body {
      margin: 0 auto;
      max-width: 980px;
      padding: 20px 14px 28px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #111827;
      text-align: center;
      background: #fff;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 4vw, 2rem);
    }

    #scoreDate {
      margin: 4px 0 14px;
      display: inline-block;
      padding: 2px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      background: #f8fafc;
      font-size: 1.25rem;
      font-weight: 700;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .page-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .top-nav,
    .mode-toggle {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .top-nav {
      gap: 8px;
    }

    .menu-btn,
    .mode-toggle button,
    #shareBtn {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      color: #111827;
      font-weight: 700;
      text-decoration: none;
      appearance: none;
      cursor: pointer;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: 0.18s ease;
    }

    .menu-btn:hover,
    .mode-toggle button:hover,
    #shareBtn:hover { filter: brightness(0.98); }

    .top-nav .menu-btn {
      background: #a78bfa;
      border-color: #8b5cf6;
      color: #fff;
    }

    .top-nav .menu-btn:hover { background: #8b5cf6; }

    .back-btn { 
      background: #93c5fd;
      border-color: #60a5fa;
      color: #1e3a8a;
    }
    .back-btn:hover { background: #60a5fa; color: #1e40af; }

    .mode-toggle {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      overflow: hidden;
      margin: 4px 0 10px;
      background: #f9fafb;
    }

    #dailyModeBtn,
    #hourlyModeBtn {
      border: none;
      border-right: 1px solid #e5e7eb;
      min-width: 95px;
      border-radius: 0;
    }

    #hourlyModeBtn { border-right: none; }

    #dailyModeBtn.active,
    #hourlyModeBtn.active {
      background: #111827;
      color: #fff;
    }

    #stats {
      margin: 10px 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      font-weight: 700;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 1rem;
    }

    #scoreErrorBanner {
      min-height: 20px;
      margin-bottom: 6px;
      color: #b91c1c;
      font-size: 14px;
    }

    #shareSection {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    #shareStatus { min-height: 19px; color: #0369a1; font-size: 13px; }
    .hidden { display: none !important; }

    #scoreList {
      width: 100%;
      margin-bottom: 12px;
    }

    #scoreList.daily-mode {
      display: block;
      width: 100%;
      padding-bottom: 4px;
    }

    #scoreList.hourly-mode {
      display: grid;
      gap: 8px;
      width: 100%;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    }

    #scoreList .empty-state {
      width: 100%;
      padding: 28px 8px;
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      background: #fafafa;
      color: #374151;
      opacity: 0.85;
    }

    .score-row {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      opacity: 0;
      transform: translateY(8px) scale(0.99);
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .score-row.visible { opacity: 1; transform: translateY(0) scale(1); }
    .score-row.missing { opacity: 0.75; border-style: dashed; }

    .daily-mode .score-row { width: 100%; }

    .city {
      font-size: clamp(15px, 3vw, 18px);
      font-weight: 800;
      line-height: 1.25;
      width: 100%;
      overflow-wrap: anywhere;
      text-align: left;
    }

    .result-circle {
      text-align: center;
      font-size: 1.45rem;
      line-height: 1.1;
      margin-top: 3px;
    }

    .detail {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 14px;
      width: 100%;
    }

    .detail-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
    }

    .detail-label {
      color: #374151;
      font-weight: 600;
      white-space: nowrap;
    }

    .detail-value {
      text-align: right;
      white-space: nowrap;
    }

    .coin {
      margin-top: 7px;
      font-weight: 700;
      width: 100%;
      text-align: right;
    }

    .daily-mode .coin { text-align: left; }

    .hourly-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .hourly-hour {
      font-size: 11px;
      font-weight: 800;
      border-radius: 999px;
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #e5e7eb;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .hourly-city {
      font-weight: 800;
      text-align: right;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      #scoreList.hourly-mode { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
      #stats { font-size: 20px; }
    }

    @media (max-width: 600px) {
      body { padding: 14px 10px 26px; }
      #scoreList.hourly-mode { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .detail { font-size: 12px; }
      .coin { font-size: 15px; }
      .stat-item { font-size: 15px; }
      .menu-btn,
      .mode-toggle button,
      #shareBtn { font-size: 13px; min-height: 36px; padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <h1>My Score</h1>
  <div id="scoreDate">Loading date…</div>

  <div class="page-controls">
    <div class="top-nav">
      <a class="menu-btn back-btn" href="daily.html"> ← Back </a>
    </div>

    <div class="mode-toggle" role="tablist" aria-label="Score mode">
      <button id="dailyModeBtn" type="button"> Daily </button>
      <button id="hourlyModeBtn" type="button"> Hourly </button>
    </div>
  </div>

  <div id="stats"></div>
  <div id="scoreErrorBanner"></div>
  <div id="scoreList" class="daily-mode"></div>

  <div id="shareSection">
    <button id="shareBtn" type="button"> Share </button>
    <div id="shareStatus"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ckyqknlxmjqlkqnxhgef.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0';

    const PTDate = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Los_Angeles',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    });

    const PTDateHeader = new Intl.DateTimeFormat(undefined, {
      timeZone: 'America/Los_Angeles',
      weekday: 'long',
      month: 'short',
      day: 'numeric',
      year: 'numeric'
    });

    function getYesterdayDate() {
      const todayPT = PTDate.format(new Date()); // e.g. "2026-03-31"
      const [y, m, d] = todayPT.split('-').map(Number);

      // Build a Date in UTC at noon for the PT "yesterday" date.
      // Noon UTC avoids DST/local-midnight edge confusion.
      return new Date(Date.UTC(y, m - 1, d - 1, 12, 0, 0));
    }

    function isoDate(date) {
      return PTDate.format(new Date(date));
    }

    const params = new URLSearchParams(location.search);

    const state = {
      targetDate: getYesterdayDate(),
      mode: params.get('from') === 'hourly' ? 'hourly' : 'daily',
      rows: { daily: [], hourly: [] },
      supabase: null,
      loading: false
    };

    const el = {
      date: document.getElementById('scoreDate'),
      dailyBtn: document.getElementById('dailyModeBtn'),
      hourlyBtn: document.getElementById('hourlyModeBtn'),
      stats: document.getElementById('stats'),
      error: document.getElementById('scoreErrorBanner'),
      list: document.getElementById('scoreList'),
      shareSection: document.getElementById('shareSection'),
      shareBtn: document.getElementById('shareBtn'),
      shareStatus: document.getElementById('shareStatus')
    };

    const MODE_CONFIG = {
      daily: {
        table: "daily_scores",
        dateKeys: ["date"],
        orderBy: [{ column: "date", ascending: false }]
      },
      hourly: {
        table: "hourly_scores",
        dateKeys: ["date"],
        orderBy: [
          { column: "date", ascending: false },
          { column: "hour", ascending: true }
        ]
      }
    };

    function init() {
      if (!window.supabase || !window.supabase.createClient) {
        setError('Supabase library failed to load.');
        return;
      }
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.includes('YOUR_SUPABASE_URL') || SUPABASE_ANON_KEY.includes('YOUR_SUPABASE_ANON_KEY')) {
        setError('Set SUPABASE_URL and SUPABASE_ANON_KEY in this file.');
        return;
      }

      state.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      setDateHeader(state.targetDate);
      el.dailyBtn.addEventListener('click', () => setMode('daily'));
      el.hourlyBtn.addEventListener('click', () => setMode('hourly'));
      el.shareBtn.addEventListener('click', handleShare);

      setMode(state.mode, false);
    }

    function setDateHeader(date) {
      el.date.textContent = `Scores for ${PTDateHeader.format(date)}`;
    }

    function setError(msg) {
      el.error.textContent = msg || '';
    }

    function setMode(nextMode, animate = true) {
      if (state.loading || (nextMode !== 'daily' && nextMode !== 'hourly')) return;

      state.mode = nextMode;

      el.dailyBtn.classList.toggle('active', nextMode === 'daily');
      el.hourlyBtn.classList.toggle('active', nextMode === 'hourly');
      el.list.classList.toggle('daily-mode', nextMode === 'daily');
      el.list.classList.toggle('hourly-mode', nextMode === 'hourly');

      // Keep sharing only for Daily mode
      el.shareSection.classList.toggle('hidden', nextMode === 'hourly');

      renderFromCache(nextMode, animate);
      loadAndRender(nextMode, animate);
    }

    function getByPath(row, key) {
      if (!row || !key) return undefined;
      if (!key.includes('.')) return row[key];

      return key.split('.').reduce((acc, part) => {
        if (acc && typeof acc === 'object') return acc[part];
        return undefined;
      }, row);
    }

    function pick(row, keys) {
      for (const key of keys) {
        const value = getByPath(row, key);
        if (value !== undefined && value !== null && value !== '') return value;
      }
      return undefined;
    }

    function formatTemp(v) {
      if (v === undefined || v === null || v === '') return '—';
      const n = Number(v);
      if (!Number.isFinite(n)) return String(v);
      return `${n.toFixed(1)}°`;
    }

    function formatError(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return '—';
      const sign = n > 0 ? '+' : '';
      return `${sign}${n.toFixed(1)}°`;
    }

    function toHour(v) {
      if (v === undefined || v === null) return 999;
      if (typeof v === 'number' && Number.isFinite(v)) return v;
      const m = String(v).match(/^(\d{1,2})/);
      return m ? Number(m[1]) : 999;
    }

    function resultCircle(errorValue) {
      const n = Number(errorValue);
      if (!Number.isFinite(n)) return '⚪';
      const a = Math.abs(n);
      if (a <= 1) return '🟢';
      if (a <= 3) return '🟡';
      return '🔴';
    }

    function normalizeRow(row, mode) {
      const cityName = pick(row, [
        'city',
        'city_name',
        'cityName',
        'name',
        'location',
        'location_name',
        'cities.name',
        'cities.city_name',
        'city.name',
        'city.city_name'
      ]);

      return {
        city: cityName || 'Unknown city',
        hour: pick(row, ['hour', 'slot', 'forecast_hour', 'time']) || '—',
        forecast: pick(row, ['forecast', 'forecast_temp', 'predicted', 'prediction', 'guess']),
        actual: pick(row, ['actual', 'actual_temp', 'observed', 'result_temp', 'real']),
        error: pick(row, ['error', 'error_value', 'difference', 'delta']),
        coins: Number(pick(row, ['coins', 'coin', 'score', 'points'])) || 0,
        streak: Number(pick(row, ['streak', 'streak_count', 'streak_total'])) || 0,
        isMissing: Boolean(pick(row, ['missing', 'is_missing']) || row.status === 'missing'),
        raw: row
      };
    }

    function toDateIso(value) {
      if (!value && value !== 0) return null;

      if (typeof value === 'string') {
        const s = value.trim();

        // Best fit for your tables: extract the leading YYYY-MM-DD from either date or datetime.
        const m = s.match(/^(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];

        return null;
      }

      const d = new Date(value);
      if (!isNaN(d.getTime())) return isoDate(d);

      return null;
    }

    function line(label, value) {
      const row = document.createElement('div');
      row.className = 'detail-line';

      const a = document.createElement('span');
      a.className = 'detail-label';
      a.textContent = label;

      const b = document.createElement('span');
      b.className = 'detail-value';
      b.textContent = value;

      row.append(a, b);
      return row;
    }

    function clearRows() {
      el.list.innerHTML = '';
      el.stats.innerHTML = '';
      el.shareStatus.textContent = '';
    }

    function sortRows(rows, mode) {
      if (mode === 'hourly') {
        return [...rows].sort((a, b) => {
          const byHour = toHour(a.hour) - toHour(b.hour);
          if (byHour !== 0) return byHour;
          return String(a.city).localeCompare(String(b.city));
        });
      }
      return [...rows];
    }

    function rowMatchesDate(row, mode = state.mode) {
      const target = isoDate(state.targetDate);
      const cfg = MODE_CONFIG[mode];
      const dateKeys = cfg?.dateKeys || ["date"];

      for (const key of dateKeys) {
        const raw = row?.[key];
        if (raw === undefined || raw === null || raw === "") continue;
        const parsed = toDateIso(raw);
        if (parsed === target) return true;
      }

      return false;
    }

    function renderFromCache(mode, animate = true) {
      clearRows();
      const rows = sortRows(state.rows[mode] || [], mode);

      if (!rows.length) {
        el.list.innerHTML = `<div class="empty-state">No ${mode} scores for this date yet.</div>`;
        return;
      }

      if (mode === 'hourly') {
        const cityCount = new Set(rows.map((r) => r.city)).size;
        const totalCoins = rows.reduce((acc, r) => acc + (Number(r.coins) || 0), 0);

        const a = document.createElement('div');
        a.className = 'stat-item';
        a.textContent = `🕒 Hourlies: ${rows.length}`;

        const b = document.createElement('div');
        b.className = 'stat-item';
        b.textContent = `🏙️ Cities: ${cityCount}`;

        const c = document.createElement('div');
        c.className = 'stat-item';
        c.textContent = `🪙 Coins: ${totalCoins}`;

        el.stats.append(a, b, c);
      }

      const frag = document.createDocumentFragment();

      rows.forEach((r, i) => {
        const card = document.createElement('article');
        card.className = 'score-row';
        if (r.isMissing) card.classList.add('missing');

        if (mode === 'daily') {
          const city = document.createElement('div');
          city.className = 'city';
          city.textContent = r.city;

          const icon = document.createElement('div');
          icon.className = 'result-circle';
          icon.textContent = resultCircle(r.error);

          const details = document.createElement('div');
          details.className = 'detail';
          details.append(
            line('Forecast', formatTemp(r.forecast)),
            line('Actual', formatTemp(r.actual)),
            line('Error', formatError(r.error))
          );

          const coins = document.createElement('div');
          coins.className = 'coin';
          coins.textContent = `🪙 ${r.coins}`;

          const streak = document.createElement('div');
          streak.className = 'coin';
          streak.textContent = `⭐ ${r.streak}`;

          card.append(city, icon, details, coins, streak);
        } else {
          const top = document.createElement('div');
          top.className = 'hourly-top';

          const hour = document.createElement('span');
          hour.className = 'hourly-hour';
          hour.textContent = `⏰ ${r.hour}`;

          const city = document.createElement('span');
          city.className = 'hourly-city';
          city.textContent = r.city;

          top.append(hour, city);

          const details = document.createElement('div');
          details.className = 'detail';
          details.append(
            line('Forecast', formatTemp(r.forecast)),
            line('Actual', formatTemp(r.actual)),
            line('Error', formatError(r.error))
          );

          const coins = document.createElement('div');
          coins.className = 'coin';
          coins.textContent = `🪙 ${r.coins}`;

          card.append(top, details, coins);
        }

        frag.append(card);

        if (animate) setTimeout(() => card.classList.add('visible'), 25 * i);
        else card.classList.add('visible');
      });

      el.list.append(frag);
    }

    function isColumnMissingError(err) {
      if (!err) return false;
      const msg = String(err.message || '');
      return err.code === '42703' || /column .* does not exist/i.test(msg);
    }

    async function loadMode(mode) {
      const cfg = MODE_CONFIG[mode];
      if (!cfg) throw new Error(`Unknown mode: ${mode}`);

      if (state.rows[mode] && state.rows[mode].length) return state.rows[mode];

      let rows = null;
      let lastError = null;

      for (const order of cfg.orderBy || []) {
        const result = await state.supabase
          .from(cfg.table)
          .select("*")
          .order(order.column, { ascending: order.ascending });

        if (!result.error) {
          rows = result.data || [];
          break;
        }

        if (isColumnMissingError(result.error)) {
          lastError = result.error;
          continue;
        }

        lastError = result.error;
        break;
      }

      if (rows === null) {
        const fallback = await state.supabase.from(cfg.table).select("*");
        if (fallback.error) throw fallback.error;
        rows = fallback.data || [];
      } else if (lastError) {
        console.warn("Ordering fallback used due to schema difference:", lastError);
      }

      const normalized = (rows || [])
        .map((r) => normalizeRow(r, mode))
        .filter((r) => rowMatchesDate(r.raw, mode));

      state.rows[mode] = normalized;
      return normalized;
    }

    async function loadAndRender(mode, animate = true) {
      setError('');
      state.loading = true;
      try {
        const rows = await loadMode(mode);
        state.rows[mode] = rows;
        renderFromCache(mode, animate);
      } catch (err) {
        const detail = err?.code ? `[${err.code}] ${err.message || 'Unknown error'}` : (err?.message || 'Unknown error');
        console.error('Supabase load error:', err);
        setError(`Failed to load ${mode} scores: ${detail}`);
        el.list.innerHTML = `<div class="empty-state">Failed to load ${mode} scores.</div>`;
      } finally {
        state.loading = false;
      }
    }

    function buildShareText() {
      const modeRows = state.rows.daily || [];
      const totalCoins = modeRows.reduce((acc, r) => acc + (Number(r.coins) || 0), 0);
      const header = `Daily score for ${isoDate(state.targetDate)}: ${totalCoins} coins`;

      const lines = modeRows.map((r) => `${resultCircle(r.error)} ${r.city}: ${formatTemp(r.forecast)} → ${formatTemp(r.actual)} (${formatError(r.error)})`);
      if (!lines.length) return `${header}\nNo results yet.`;
      return `${header}\n${lines.join('\n')}`;
    }

    function fallbackCopyText(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'absolute';
      ta.style.left = '-9999px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();

      let ok = false;
      try {
        ok = document.execCommand('copy');
      } catch (e) {
        ok = false;
      }

      document.body.removeChild(ta);
      return ok;
    }

    async function handleShare() {
      if (state.mode === 'hourly') return;

      const text = buildShareText();

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          el.shareStatus.textContent = 'Copied score ✅';
          return;
        }

        if (fallbackCopyText(text)) {
          el.shareStatus.textContent = 'Copied score ✅';
        } else {
          el.shareStatus.textContent = 'Clipboard not available in this browser';
        }
      } catch (err) {
        console.error(err);
        if (fallbackCopyText(text)) {
          el.shareStatus.textContent = 'Copied score ✅';
        } else {
          el.shareStatus.textContent = 'Could not copy. Please copy manually.';
        }
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
