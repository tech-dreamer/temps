<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard</title>
  <style>
    :root{
      --bg1: #fffaf5;
      --bg2: #f7f3ff;
      --card: #fffdf9;
      --card-soft: #f7f6ff;
      --ink: #2f2a40;
      --muted: #6b647d;
      --line: #e9e3f7;
      --shadow: 0 14px 30px rgba(78, 56, 128, 0.14);
      --fw-heavy: 650;
      --fw-body: 500;
      --fw-title: 760;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 238, 191, 0.5), transparent 20%),
        radial-gradient(circle at 85% 25%, rgba(183, 124, 255, 0.20), transparent 25%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-size: 17px;
      line-height: 1.45;
      font-weight: var(--fw-body);
    }

    .app { width: min(980px, 100%); }

    .header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      background: linear-gradient(140deg, #ffffffdd, #fef7ffcc);
      border: 1px solid #ecdff9;
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .title-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.95rem;
      font-weight: var(--fw-title);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      font-weight: 540;
      max-width: 680px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      width: 100%;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 1.02rem;
      font-weight: var(--fw-heavy);
      cursor: pointer;
      background: linear-gradient(120deg, #b77cff, #a78bfa);
      color: #fff;
      transition: transform .12s ease, filter .12s ease;
      box-shadow: 0 8px 18px rgba(158, 106, 255, 0.28);
    }

    .board {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      text-align: center;
    }

    .board-head {
      padding: 12px 16px;
      background: linear-gradient(to right, #ffefe5, #f6ecff);
      border-bottom: 1px solid #e9ddf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
    }

    .board-head strong {
      font-size: 1.12rem;
      letter-spacing: 0.2px;
      display: block;
      font-weight: 700;
    }

    .status {
      font-size: 0.97rem;
      color: var(--muted);
      display: block;
      word-break: break-word;
      text-align: center;
      max-width: 100%;
      font-weight: 530;
    }

    .list-wrap {
      max-height: 62vh;
      overflow: auto;
      padding: 6px;
    }

    .player-list {
      margin: 0;
      padding: 0;
      list-style: none;
      width: 100%;
    }

    .row {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      margin: 4px 4px;
      background: var(--card-soft);
      border: 1px solid #efe8fb;
      transition: transform .12s ease, background .15s ease;
    }

    .row:hover {
      background: #fff;
      transform: translateX(2px);
    }

    .rank {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      background: #fff7eb;
      border: 1px solid #ffe0ba;
      color: #7d560b;
    }

    .rank.gold { background: #fff4cf; border-color: #ffd77c; color: #8d6300; }
    .rank.silver { background: #f6f6f8; border-color: #d1d5db; color: #545860; }
    .rank.bronze { background: #f4e7d8; border-color: #f0cda3; color: #8d5633; }

    .name {
      font-weight: 650;
      font-size: 1.08rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    .coins {
      justify-self: end;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      background: #edfcff;
      color: #0b5565;
      border: 1px solid #c7f0f7;
      font-variant-numeric: tabular-nums;
      font-size: 1.04rem;
      white-space: nowrap;
    }

    .coins .coin-emoji {
      margin-right: 6px;
    }

    .empty, .error {
      text-align: center;
      color: var(--muted);
      padding: 26px 16px;
      font-size: 1rem;
      font-weight: 520;
    }

    .error { color: #8b1a2f; text-align: left; }

    .error-title {
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      font-size: 1.06rem;
    }

    .error-line {
      margin: 0 0 6px 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.93rem;
      text-align: left;
      background: #fff3f4;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #ffd0d8;
      font-weight: 520;
    }

    @media (max-width: 560px) {
      body { padding: 10px; font-size: 16px; }
      h1 { font-size: 1.7rem; }
      .subtitle { font-size: 1.01rem; }
      .board-head strong { font-size: 1.05rem; }
      .status { font-size: 0.93rem; }
      .row { grid-template-columns: 52px 1fr auto; padding: 10px; }
      .rank { width: 40px; height: 40px; }
      .name { font-size: 1.01rem; }
      .coins { font-size: 0.96rem; padding: 7px 10px; }
      .empty, .error { font-size: 0.95rem; }
      .error-title, .error-line { font-size: 0.92rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="title-box">
        <h1>🔮 Temps Leaderboard 🔮</h1>
        <p class="subtitle">View top users & you</p>
      </div>
      <div class="toolbar">
        <button id="refreshBtn">Refresh</button>
      </div>
    </section>

    <section class="board">
      <div class="board-head">
        <strong>Monthly Standings</strong>
        <span class="status" id="status">Loading…</span>
      </div>
      <div class="list-wrap">
        <ul class="player-list" id="rows">
          <li class="empty">Loading leaderboard…</li>
        </ul>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://ckyqknlxmjqlkqnxhgef.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNreXFrbmx4bWpxbGtxbnhoZ2VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ5MDEwNjksImV4cCI6MjA4MDQ3NzA2OX0.KPzrKD3TW1CubAQhHyo5oJV0xQ_GLxBG96FSDfTN6p0";

    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");
    const refreshBtn = document.getElementById("refreshBtn");

    const headers = {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json"
    };

    const LEADERBOARD_URL = `${SUPABASE_URL}/rest/v1/leaderboard?select=id,username,coins`;
    const SOURCE_LABEL = "leaderboard view";

    const formatNumber = (value) => Number(value || 0).toLocaleString("en-US");

    function sanitizeUsername(username) {
      const u = (username || "").trim();
      return u ? u : "anon";
    }

    function normalizeRows(data) {
      if (!Array.isArray(data)) return [];
      return data.map((r) => ({
        username: sanitizeUsername(r.username),
        coins: Number(r.coins || 0)
      }));
    }

    function rankEmoji(i) {
      if (i === 1) return "🥇";
      if (i === 2) return "🥈";
      if (i === 3) return "🥉";
      return `#${formatNumber(i)}`;
    }

    function getRankClass(i) {
      if (i === 1) return "gold";
      if (i === 2) return "silver";
      if (i === 3) return "bronze";
      return "";
    }

    function renderPlayers(players) {
      rowsEl.innerHTML = "";

      if (!players.length) {
        rowsEl.innerHTML = `<li class="empty">No users yet.</li>`;
        statusEl.textContent = "No users yet";
        return;
      }

      players.sort((a, b) => {
        if (b.coins !== a.coins) return b.coins - a.coins;
        return a.username.localeCompare(b.username);
      });

      let rank = 0;
      let lastCoins = null;
      const ranked = players.map((p, idx) => {
        if (p.coins !== lastCoins) {
          rank = idx + 1;
          lastCoins = p.coins;
        }
        return { ...p, rank };
      });

      statusEl.textContent = `Updated ${new Date().toLocaleTimeString("en-US", {timeZone: "America/Los_Angeles", hour: "2-digit", minute: "2-digit", hour12: true})}`;

      for (const p of ranked) {
        const li = document.createElement("li");
        li.className = "row";
        const rankClass = getRankClass(p.rank);

        li.innerHTML = `
          <div class="rank ${rankClass}">${rankEmoji(p.rank)}</div>
          <div class="name" title="${p.username}">${p.username}</div>
          <div class="coins"><span class="coin-emoji">🪙</span>${formatNumber(p.coins)} coins</div>
        `;
        rowsEl.appendChild(li);
      }
    }

    function renderError(errors) {
      rowsEl.innerHTML = "";

      const li = document.createElement("li");
      li.className = "error";

      const title = document.createElement("div");
      title.className = "error-title";
      title.textContent = "Couldn’t load leaderboard.";
      li.appendChild(title);

      if (!errors.length) {
        const line = document.createElement("p");
        line.className = "error-line";
        line.textContent = "No query was attempted.";
        li.appendChild(line);
      } else {
        for (const err of errors) {
          const p = document.createElement("div");
          p.className = "error-line";
          p.textContent = `${err.label}: ${err.summary}\n${err.body}`;
          li.appendChild(p);
        }
      }

      const fixHint = document.createElement("p");
      fixHint.className = "error-line";
      fixHint.textContent =
        "Likely causes: wrong endpoint/table name, missing trailing slash in SUPABASE_URL, or Row Level Security policy blocking anon access.\n" +
        "Open browser DevTools Network/Console to inspect exact request status and body.";
      li.appendChild(fixHint);

      rowsEl.appendChild(li);
      statusEl.textContent = "Failed to load";
    }

    function summarizeBody(bodyText) {
      if (!bodyText) return "(empty response)";
      return bodyText.slice(0, 800);
    }

    async function requestJSON(url) {
      const res = await fetch(url, { method: "GET", headers });
      const text = await res.text();

      if (!res.ok) {
        throw {
          status: res.status,
          statusText: res.statusText,
          body: summarizeBody(text)
        };
      }

      try {
        return JSON.parse(text);
      } catch {
        throw {
          status: 0,
          statusText: "Invalid JSON",
          body: summarizeBody(text)
        };
      }
    }

    async function fetchLeaderboard() {
      statusEl.textContent = "Loading…";
      rowsEl.innerHTML = `<li class="empty">Loading leaderboard…</li>`;

      const errors = [];

      try {
        const data = await requestJSON(LEADERBOARD_URL);
        const players = normalizeRows(data);
        renderPlayers(players);
        return;
      } catch (err) {
        errors.push({
          label: SOURCE_LABEL,
          summary: `${err.status || "N/A"} ${err.statusText || ""}`.trim(),
          body: err.body
        });
      }

      renderError(errors);
      console.error("Leaderboard load failed:", errors);
    }

    refreshBtn.addEventListener("click", fetchLeaderboard);
    fetchLeaderboard();
  </script>
</body>
</html>
