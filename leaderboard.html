<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Leaderboard </title>
  <style>
    :root{
      --bg1: #fffaf5;
      --bg2: #f7f3ff;
      --card: #fffdf9;
      --card-soft: #f7f6ff;
      --ink: #2f2a40;
      --muted: #6b647d;
      --line: #e9e3f7;
      --shadow: 0 14px 30px rgba(78, 56, 128, 0.14);
      --fw-heavy: 650;
      --fw-body: 500;
      --fw-title: 760;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Segoe UI", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 238, 191, 0.5), transparent 20%),
        radial-gradient(circle at 85% 25%, rgba(183, 124, 255, 0.20), transparent 25%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-size: 17px;
      line-height: 1.45;
      font-weight: var(--fw-body);
    }

    .app { width: min(980px, 100%); }

    .header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      background: linear-gradient(140deg, #ffffffdd, #fef7ffcc);
      border: 1px solid #ecdff9;
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .title-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 1.95rem;
      font-weight: var(--fw-title);
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.08rem;
      font-weight: 540;
      max-width: 680px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      width: 100%;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 1.12rem;
      font-weight: var(--fw-heavy);
      cursor: pointer;
      background: linear-gradient(120deg, #b77cff, #a78bfa);
      color: #fff;
      transition: transform .12s ease, filter .12s ease;
      box-shadow: 0 8px 18px rgba(158, 106, 255, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .board {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      text-align: center;
    }

    .board-head {
      padding: 12px 16px;
      background: linear-gradient(to right, #ffefe5, #f6ecff);
      border-bottom: 1px solid #e9ddf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-align: center;
    }

    .board-title {
      font-size: 1.33rem;
      letter-spacing: 0.2px;
      display: block;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
    }

    .month-sep,
    .month-label {
      margin-left: 0.18rem;
      margin-right: 0.18rem;
      font-size: inherit;
      font-weight: inherit;
      color: inherit;
    }

    .ranking-note {
      margin: 0;
      font-size: 0.93rem;
      color: var(--muted);
      text-align: center;
      max-width: 95%;
      line-height: 1.35;
      font-weight: 500;
    }

    .status {
      font-size: 0.97rem;
      color: var(--muted);
      display: block;
      word-break: break-word;
      text-align: center;
      max-width: 100%;
      font-weight: 530;
    }

    .list-wrap {
      max-height: 62vh;
      overflow: auto;
      padding: 6px;
    }

    .player-list {
      margin: 0;
      padding: 0;
      list-style: none;
      width: 100%;
    }

    .row {
      display: grid;
      grid-template-columns: 64px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 14px;
      margin: 4px 4px;
      background: var(--card-soft);
      border: 1px solid #efe8fb;
      transition: transform .12s ease, background .15s ease;
    }

    .row:hover {
      background: #fff;
      transform: translateX(2px);
    }

    .rank {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      background: #fff7eb;
      border: 1px solid #ffe0ba;
      color: #7d560b;
    }

    .rank.gold { background: #fff4cf; border-color: #ffd77c; color: #8d6300; }
    .rank.silver { background: #f6f6f8; border-color: #d1d5db; color: #545860; }
    .rank.bronze { background: #f4e7d8; border-color: #f0cda3; color: #8d5633; }

    .name {
      font-weight: 650;
      font-size: 1.08rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
      min-width: 0;
    }

    .stat-col {
      justify-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.1;
      min-width: 56px;
      padding: 8px 6px;
      border-radius: 10px;
      background: #edfcff;
      border: 1px solid #c7f0f7;
    }

    .stat-emoji {
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: #2b6f7f;
    }

    .stat-value {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #0b5565;
      font-size: 1.04rem;
      white-space: nowrap;
    }

    .empty, .error {
      text-align: center;
      color: var(--muted);
      padding: 26px 16px;
      font-size: 1rem;
      font-weight: 520;
    }

    .error { color: #8b1a2f; text-align: left; }

    .error-title {
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      font-size: 1.06rem;
    }

    .error-line {
      margin: 0 0 6px 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.93rem;
      text-align: left;
      background: #fff3f4;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #ffd0d8;
      font-weight: 520;
    }

    @media (max-width: 560px) {
      body { padding: 10px; font-size: 16px; }
      h1 { font-size: 1.7rem; }
      .board-title { font-size: 1.18rem; }
      .ranking-note { font-size: 0.88rem; }
      .status { font-size: 0.93rem; }
      .row { grid-template-columns: 52px 1fr auto auto; padding: 10px; gap: 10px; }
      .rank { width: 40px; height: 40px; }
      .name { font-size: 1.01rem; }
      .stat-col { min-width: 52px; padding: 7px 4px; }
      .stat-value { font-size: 0.96rem; }
      .empty, .error { font-size: 0.95rem; }
      .error-title, .error-line { font-size: 0.92rem; }
      button {
        padding: 10px 20px;
        font-size: 1.03rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div class="title-box">
        <h1> 🐰 TWF Leaderboard 🔮 </h1>
        <p class="subtitle"> View top users &amp; you </p>
      </div>
      <div class="toolbar">
        <button id="refreshBtn" type="button"> Go Home </button>
      </div>
    </section>

    <section class="board">
      <div class="board-head">
        <strong class="board-title">
          Monthly Standings
          <span class="month-sep" id="monthSep" aria-hidden="true">—</span>
          <span class="month-label" id="monthLabel"></span>
        </strong>
        <p class="ranking-note">
          Ranked by most coins, then streak, then mood, then earliest account creation
        </p>
        <span class="status" id="status"> Loading… </span>
      </div>
      <div class="list-wrap">
        <ul class="player-list" id="rows">
          <li class="empty"> Loading leaderboard… </li>
        </ul>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://ckyqknlxmjqlkqnxhgef.supabase.co";
    const SUPABASE_PUB_KEY = "sb_publishable_lQ27fzzwJf27dUWPEW8UQA_NTY7naO6";

    const statusEl = document.getElementById("status");
    const rowsEl = document.getElementById("rows");
    const refreshBtn = document.getElementById("refreshBtn");
    const monthLabelEl = document.getElementById("monthLabel");

    const MONTH_NAMES = [ "Jan", "Feb", "Mar", "Apr", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec" ];

    const headers = {
      apikey: SUPABASE_PUB_KEY,
      Authorization: `Bearer ${SUPABASE_PUB_KEY}`,
      "Content-Type": "application/json"
    };

    // Fetch all needed fields for ranking logic
    const LEADERBOARD_URL = `${SUPABASE_URL}/rest/v1/leaderboard?select=user_id,username,coins,current_streak,mood,created_at,rank`;
    const SOURCE_LABEL = "leaderboard view";

    let cachedCurrentUserId = null;
    const formatNumber = (value) => Number(value || 0).toLocaleString("en-US");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function sanitizeUsername(username) {
      const u = (username || "").trim();
      return u ? u : "Anon";
    }

    function decodeJwtSub(token) {
      try {
        const parts = String(token).split(".");
        if (parts.length < 2) return null;
        const base64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
        const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
        const payload = JSON.parse(atob(padded));
        return payload?.sub || null;
      } catch {
        return null;
      }
    }

    function getStoredUserIdFromLocalStorage() {
      try {
        const keys = Object.keys(localStorage);
        for (const key of keys) {
          if (!key.includes("auth-token")) continue;
          const raw = localStorage.getItem(key);
          if (!raw) continue;

          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch {
            continue;
          }

          const session = parsed.currentSession || parsed.current_session || parsed.session || parsed;
          const directId = session?.user?.id || parsed?.user?.id;
          if (directId) return String(directId);

          const token = session?.access_token || parsed?.access_token;
          if (token) {
            const sub = decodeJwtSub(token);
            if (sub) return String(sub);
          }
        }
      } catch {
        return null;
      }
      return null;
    }

    async function getUserIdFromAuthCookie() {
      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: "GET",
          headers: {
            apikey: SUPABASE_PUB_KEY
          },
          credentials: "include"
        });

        if (!res.ok) return null;
        const body = await res.json();
        return body?.id ? String(body.id) : null;
      } catch {
        return null;
      }
    }

    async function getCurrentUserId() {
      if (cachedCurrentUserId !== null) return cachedCurrentUserId;

      let id = getStoredUserIdFromLocalStorage();
      if (!id) id = await getUserIdFromAuthCookie();

      cachedCurrentUserId = id;
      return id;
    }

    function resolveDisplayName(row, currentUserId) {
      const viewDisplay = (row.display_name || "").trim();
      const username = sanitizeUsername(row.username);

      if (viewDisplay && viewDisplay.toLowerCase() !== "anon") {
        return viewDisplay;
      }

      if (username && username !== "Anon") return username;

      if (currentUserId && String(row.user_id || "") === String(currentUserId)) {
        return "Me";
      }

      return "Anon";
    }

    function normalizeRows(data, currentUserId) {
      if (!Array.isArray(data)) return [];
      return data.map((r, idx) => ({
        userId: String(r.user_id || ""),
        coins: Number(r.coins || 0),
        current_streak: Number(r.current_streak || 0),
        mood: Number(r.mood || 0),
        created_at: r.created_at || "",
        rank: Number(r.rank || idx + 1),
        name: resolveDisplayName(r, currentUserId)
      }));
    }

    function rankEmoji(i) {
      if (i === 1) return "🥇";
      if (i === 2) return "🥈";
      if (i === 3) return "🥉";
      return `#${formatNumber(i)}`;
    }

    function getRankClass(i) {
      if (i === 1) return "gold";
      if (i === 2) return "silver";
      if (i === 3) return "bronze";
      return "";
    }

    function getMonthLabel(date = new Date()) {
      const month = MONTH_NAMES[date.getMonth()] || date.toLocaleString("en-US", { month: "short" });
      const year = date.getFullYear();
      return `${month} ${year}`;
    }

    // Ranking system: coins desc, current streak desc, mood desc, created_at asc
    function rankComparator(a, b) {
      if (b.coins !== a.coins) return b.coins - a.coins;
      if (b.current_streak !== a.current_streak) return b.current_streak - a.current_streak;
      if (b.mood !== a.mood) return b.mood - a.mood;

      const aTime = Date.parse(a.created_at);
      const bTime = Date.parse(b.created_at);
      const aValid = Number.isFinite(aTime);
      const bValid = Number.isFinite(bTime);

      if (aValid && bValid && aTime !== bTime) return aTime - bTime; // older first
      if (aValid !== bValid) return aValid ? -1 : 1;

      return a.name.localeCompare(b.name);
    }

    function renderPlayers(players) {
      rowsEl.innerHTML = "";

      if (!players.length) {
        rowsEl.innerHTML = `<li class="empty">No users yet.</li>`;
        statusEl.textContent = "No users yet";
        return;
      }

      const ordered = [...players]
        .sort(rankComparator)
        .map((player, idx) => ({ ...player, displayRank: idx + 1 }));

      statusEl.textContent = `Updated ${new Date().toLocaleTimeString("en-US", { timeZone: "America/Los_Angeles", hour: "2-digit", minute: "2-digit", hour12: true })}`;

      for (const p of ordered) {
        const li = document.createElement("li");
        li.className = "row";
        const rankClass = getRankClass(p.displayRank);

        const safeName = escapeHtml(p.name);
        li.innerHTML = `
          <div class="rank ${rankClass}">${rankEmoji(p.displayRank)}</div>
          <div class="name" title="${safeName}">${safeName}</div>
          <div class="stat-col">
            <div class="stat-emoji">🪙</div>
            <div class="stat-value">${formatNumber(p.coins)}</div>
          </div>
          <div class="stat-col">
            <div class="stat-emoji">🌟</div>
            <div class="stat-value">${formatNumber(p.current_streak)}</div>
          </div>
        `;
        rowsEl.appendChild(li);
      }
    }

    function renderError(errors) {
      rowsEl.innerHTML = "";

      const li = document.createElement("li");
      li.className = "error";

      const title = document.createElement("div");
      title.className = "error-title";
      title.textContent = "Couldn’t load leaderboard.";
      li.appendChild(title);

      if (!errors.length) {
        const line = document.createElement("p");
        line.className = "error-line";
        line.textContent = "No query was attempted.";
        li.appendChild(line);
      } else {
        for (const err of errors) {
          const p = document.createElement("div");
          p.className = "error-line";
          p.textContent = `${err.label}: ${err.summary}\n${err.body}`;
          li.appendChild(p);
        }
      }

      const fixHint = document.createElement("p");
      fixHint.className = "error-line";
      fixHint.textContent =
        "Likely causes: wrong endpoint/table name, missing trailing slash in SUPABASE_URL, or Row Level Security policy blocking anon access.\n" +
        "Open browser DevTools Network/Console to inspect exact request status and body.";
      li.appendChild(fixHint);

      rowsEl.appendChild(li);
      statusEl.textContent = "Failed to load";
    }

    function summarizeBody(bodyText) {
      if (!bodyText) return "(empty response)";
      return bodyText.slice(0, 800);
    }

    async function requestJSON(url) {
      const res = await fetch(url, { method: "GET", headers });
      const text = await res.text();

      if (!res.ok) {
        throw {
          status: res.status,
          statusText: res.statusText,
          body: summarizeBody(text)
        };
      }

      try {
        return JSON.parse(text);
      } catch {
        throw {
          status: 0,
          statusText: "Invalid JSON",
          body: summarizeBody(text)
        };
      }
    }

    async function fetchLeaderboard() {
      statusEl.textContent = "Loading…";
      rowsEl.innerHTML = `<li class="empty">Loading leaderboard…</li>`;

      const errors = [];

      try {
        const me = await getCurrentUserId();
        const data = await requestJSON(LEADERBOARD_URL);
        const players = normalizeRows(data, me);
        renderPlayers(players);
        return;
      } catch (err) {
        errors.push({
          label: SOURCE_LABEL,
          summary: `${err.status || "N/A"} ${err.statusText || ""}`.trim(),
          body: err.body
        });
      }

      renderError(errors);
      console.error("Leaderboard load failed:", errors);
    }

    refreshBtn.addEventListener("click", () => {
      window.location.href = "home";
    });

    if (monthLabelEl) {
      monthLabelEl.textContent = getMonthLabel();
    }
    fetchLeaderboard();
  </script>
</body>
</html>
