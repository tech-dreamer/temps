<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourly Forecasts</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    #helpCloseBtn {
      display: none !important;
    }

    #goToDailyBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 1.3rem;
      background: #9b59b6;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      line-height: 1.2;
      text-decoration: none;
      white-space: nowrap;
      box-sizing: border-box;
    }

    #goToDailyBtn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .hourly-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14rem;
      min-width: 14rem;
      max-width: 14rem;
      height: 2.75rem;
      min-height: 2.75rem;
      padding: 0 1rem;
      box-sizing: border-box;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 0.5rem;
      text-align: center;
      text-decoration: none;
      white-space: normal;
      cursor: pointer;
      transition: all 0.2s ease;
      line-height: 1.2;
    }

    #hourlySaveBtn {
      background: #3b82f6;
      color: #ffffff;
      border: 1px solid #2563eb;
    }

    #hourlySaveBtn:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(59, 130, 246, 0.25);
    }

    #hourlyScoreBtn {
      background: #22c55e;
      color: #ffffff;
      border: 1px solid #16a34a;
    }

    #hourlyScoreBtn:hover {
      background: #16a34a;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>

  <div style="text-align:center; margin:1rem 0; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="daily.html">
      <button type="button" id="goToDailyBtn"> ← Go to Daily Forecasts </button>
    </a>
  </div>

  <h1 style="text-align:center;"> ⏲️ My Hourly Forecasts 🔮 </h1>

  <p id="currentHourlyDate" style="text-align:center;font-weight:600;margin:0.5rem auto;">
    Forecast date loading...
  </p>

  <p style="text-align:center; margin:0.5rem auto 1rem; color:#000;">
    Cutoff = 30 mins before the hour
    <span class="pt-info">
      ⓘ
      <span class="pt-tooltip"> Hours shown in Eastern Time (ET) </span>
    </span>
  </p>

  <!-- Hour Selector -->
  <div id="hourSelector" class="hour-selector"></div>

  <!-- Forecast Form -->
  <form id="hourlyForm">
    <div id="hourlyGrid" class="city-grid"></div>

    <div style="text-align:center;margin:1rem 0;">
      <button type="submit" id="hourlySaveBtn" class="hourly-action-btn" disabled>
        Choose an Hour
      </button>
    </div>
  </form>

  <!-- Status Messages -->
  <div id="status" style="text-align:center;margin-top:0.5rem;"></div>

  <div style="text-align:center;margin:1rem 0 0.5rem;">
    <a href="score.html?mode=hourly">
      <button type="button" id="hourlyScoreBtn" class="hourly-action-btn">
        📊 View My Scores
      </button>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
