<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Hourly Forecasts </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .hourly-action-btn {
      padding: 0.65rem 1.25rem;
      border-radius: 0.5rem;
      border: 1px solid #0f766e;
      font: 600 1rem/1.25rem Arial, sans-serif;
      min-width: 14rem;
      text-align: center;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    #hourlySaveBtn {
      background: #0f766e;
      color: #ffffff;
      border-color: #0f766e;
    }

    #hourlySaveBtn:hover {
      background: #0d9488;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.25);
    }

    #hourlyScoreBtn {
      background: #32CD32;
      color: #ffffff;
      border: none;
    }

    #hourlyScoreBtn:hover {
      background: #008000;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>

  <div style="text-align:center; margin:1rem 0; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="daily.html">
      <button type="button"> ← Go to Daily Forecasts </button>
    </a>
  </div>

  <h1 style="text-align:center;"> ⏲️ My Hourly Forecasts 🔮 </h1>

  <p id="currentHourlyDate" style="text-align:center;font-weight:600;margin:0.5rem auto;">
    Forecast date loading...
  </p>

  <p style="text-align:center; margin:0.5rem auto 1rem; color:#000;">
    Cutoff = 30 mins before the hour
    <span class="pt-info">
      ⓘ
      <span class="pt-tooltip"> Hours shown in Eastern Time (ET) </span>
    </span>
  </p>

  <!-- Hour Selector -->
  <div id="hourSelector" class="hour-selector"></div>

  <!-- Forecast Form -->
  <form id="hourlyForm">
    <div id="hourlyGrid" class="city-grid"></div>

    <div style="text-align:center;margin:1rem 0;">
      <button type="submit" id="hourlySaveBtn" class="hourly-action-btn" disabled>
        Choose an Hour
      </button>
    </div>
  </form>

  <!-- Status Messages -->
  <div id="status" style="text-align:center;margin-top:0.5rem;"></div>

  <div style="text-align:center;margin:1rem 0 0.5rem;">
    <a href="score.html?mode=hourly">
      <button type="button" id="hourlyScoreBtn" class="hourly-action-btn"> 📊 View My Hourly Scores </button>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
