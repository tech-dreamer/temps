<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Hourly Forecasts </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --brand-purple: #BF40BF;
      --brand-purple-hover: #A63BA6; 
      --brand-blue: #4169E1;
      --brand-blue-hover: #3556CA;
      --brand-green: #228B22;
      --brand-green-hover: #1D7A1D;
      
      --brand-blue-soft: #E8EDFF;
      --brand-blue-soft-border: #B9C7F4;
      --brand-shadow-blue: rgba(65, 105, 225, 0.28);
      --brand-shadow-green: rgba(34, 139, 34, 0.28);
      --text-on-brand: #ffffff;
    }

    #goToDailyBtn {
      padding: 0.8rem 1.3rem;
      background: var(--brand-purple);
      color: var(--text-on-brand);
      border: 1px solid var(--brand-purple);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.2rem;
      line-height: 1.1;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    #goToDailyBtn:hover {
      background: var(--brand-purple-hover);
      border-color: var(--brand-purple-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(166, 59, 166, 0.25);
    }

    #forecastDateLine,
    #forecastDateLine span,
    #currentHourlyDateDisplay {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
    }

    /* Make hourly action buttons match daily button sizing/height/line-height */
    .hourly-action-btn {
      white-space: nowrap;
      width: auto;
      min-width: 0;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1;
      height: 3rem !important;
      min-height: 3rem !important;
      padding: 0 2.2rem;
      border-radius: 14px;
      border: 1px solid transparent;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-on-brand);
      text-decoration: none;
      appearance: none;
      -webkit-appearance: none;
      margin: 0;
    }
    
    /* explicit save button states */
    #hourlySaveBtn {
      background: var(--brand-blue);
      border-color: var(--brand-blue);
      color: var(--text-on-brand);
    }
    
    #hourlySaveBtn:disabled {
      background: #ffffff;
      border-color: var(--brand-blue) !important;
      color: var(--brand-blue);
      opacity: 0.5;
      cursor: not-allowed;
      height: 2.9rem !important;
      min-height: 2.9rem !important;
    }
    
    #hourlySaveBtn:hover:not(:disabled),
    #hourlySaveBtn:focus-visible:not(:disabled) {
      background: var(--brand-blue-hover);
      border-color: var(--brand-blue-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px var(--brand-shadow-blue);
    }

    #hourlyScoreBtn {
      background: var(--brand-green);
      border-color: var(--brand-green);
      color: var(--text-on-brand);
    }

    #hourlyScoreBtn:hover {
      background: var(--brand-green-hover);
      border-color: var(--brand-green-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px var(--brand-shadow-green);
    }
 
    #hourSelector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    #hourSelector .hour-box {
      background: var(--brand-blue-soft);
      border: 1px solid var(--brand-blue-soft-border);
      color: var(--brand-blue);
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      margin: 0.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 700;
    }
    
    #hourSelector .hour-box.selected {
      background: var(--brand-blue) !important;
      border-color: var(--brand-blue-hover) !important;
      color: var(--text-on-brand) !important;
      box-shadow: 0 0 0 2px var(--brand-blue-hover);
    }

    .latest-temps-caption {
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
    }
    
    .latest-temps-caption a {
      color: var(--brand-blue);
      text-decoration: underline;
      font-weight: 600;
    }
    
    .latest-temps-caption a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div style="text-align:center; margin:1rem 0; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="daily">
      <button type="button" id="goToDailyBtn"> Go to Daily Forecasts </button>
    </a>
  </div>

  <h1 style="text-align:center;"> ⏲️ My Hourly Forecasts 🔮 </h1>

  <p id="forecastDateLine" style="text-align:center;margin:0.5rem auto;">
    <span>Forecast Date: </span>
    <span id="currentHourlyDateDisplay"> Forecast date loading... </span>
    <span id="currentHourlyDate" style="display:none;"> Forecast date loading... </span>
  </p>

  <p style="text-align:center; margin:0.5rem auto 1rem; color:#000;">
    Cutoff = 30 mins before the hour
    <span class="pt-info">
      ⓘ
      <span class="pt-tooltip"> Hours shown in Eastern Time (ET) </span>
    </span>
  </p>

  <div id="hourSelector" class="hour-selector"></div>

  <form id="hourlyForm">
    <div id="hourlyGrid" class="city-grid"></div>

    <div style="text-align:center;margin:1rem 0;">
      <button type="submit" id="hourlySaveBtn" class="hourly-action-btn" disabled>
        Choose an Hour
      </button>
    </div>
  </form>

  <div id="status" style="text-align:center;margin-top:0.5rem;"></div>

  <div style="text-align:center;margin:1rem 0 0.5rem;">
    <a href="score?mode=hourly">
      <button type="button" id="hourlyScoreBtn" class="hourly-action-btn">
        📊 View My Scores
      </button>
    </a>
  </div>

  <script src="script.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const rawEl = document.getElementById('currentHourlyDate');  // used by existing logic
    const displayEl = document.getElementById('currentHourlyDateDisplay');  // what user sees
    if (!rawEl || !displayEl) return;
  
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  
    const toDDMonYYYY = (raw) => {
      const txt = raw.trim();
  
      if (/^\d{1,2}\s+[A-Za-z]{3}\s+\d{4}$/.test(txt)) return txt;
  
      const parsed = new Date(txt);
      if (!Number.isNaN(parsed.getTime())) {
        return `${parsed.getDate()} ${monthNames[parsed.getMonth()]} ${parsed.getFullYear()}`;
      }
  
      const match = txt.match(/^([A-Za-z]{3,9})\s+(\d{1,2}),\s*(\d{4})$/);
      if (match) return `${match[2]} ${match[1].slice(0, 3)} ${match[3]}`;
  
      return txt || 'Forecast date loading...';
    };
  
    const syncDate = () => {
      const raw = (rawEl.textContent || '').trim();
      if (!raw || /loading/i.test(raw)) {
        displayEl.textContent = 'Forecast date loading...';
        return;
      }
      displayEl.textContent = toDDMonYYYY(raw);
    };
  
    syncDate();
    new MutationObserver(syncDate).observe(rawEl, {
      childList: true,
      characterData: true,
      subtree: true
    });
  });
  </script>
</body>
</html>
