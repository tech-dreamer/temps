<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Hourly Forecasts </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --brand-purple: #BF40BF;
      --brand-purple-hover: #A63BA6; 
      --brand-blue: #4169E1;
      --brand-blue-hover: #3556CA;
      --brand-green: #228B22;
      --brand-green-hover: #1D7A1D;
      
      --brand-blue-soft: #E8EDFF;
      --brand-blue-soft-border: #B9C7F4;
      --brand-shadow-blue: rgba(65, 105, 225, 0.28);
      --brand-shadow-green: rgba(34, 139, 34, 0.28);
      --text-on-brand: #ffffff;
    }

    #goToDailyBtn {
      padding: 0.8rem 1.3rem;
      background: var(--brand-purple);
      color: var(--text-on-brand);
      border: 1px solid var(--brand-purple);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1.1;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    #goToDailyBtn:hover {
      background: var(--brand-purple-hover);
      border-color: var(--brand-purple-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(166, 59, 166, 0.25);
    }

    /* Make hourly action buttons match daily button sizing/height/line-height */
    .hourly-action-btn {
      white-space: nowrap;
      width: auto;
      min-width: 0;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1;
      height: 3rem;
      min-height: 3rem;
      padding: 0 1.75rem;
      border-radius: 14px;
      border: 1px solid transparent;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-on-brand);
      text-decoration: none;
      appearance: none;
      -webkit-appearance: none;
    }

    #hourlySaveBtn {
      background: var(--brand-blue);
      border-color: var(--brand-blue);
      color: var(--text-on-brand);
    }

    #hourlySaveBtn:hover {
      background: var(--brand-blue-hover);
      border-color: var(--brand-blue-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px var(--brand-shadow-blue);
    }

    #hourlyScoreBtn {
      background: var(--brand-green);
      border-color: var(--brand-green);
      color: var(--text-on-brand);
    }

    #hourlyScoreBtn:hover {
      background: var(--brand-green-hover);
      border-color: var(--brand-green-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px var(--brand-shadow-green);
    }
 
    #hourSelector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    #hourSelector .hour-box {
      background: var(--brand-blue-soft);
      border: 1px solid var(--brand-blue-soft-border);
      color: var(--brand-blue);
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      margin: 0.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 700;
    }
    
    #hourSelector .hour-box.selected {
      background: var(--brand-blue) !important;
      border-color: var(--brand-blue-hover) !important;
      color: var(--text-on-brand) !important;
      box-shadow: 0 0 0 2px var(--brand-blue-hover);
    }

    .latest-temps-caption {
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
    }
    
    .latest-temps-caption a {
      color: var(--brand-blue);
      text-decoration: underline;
      font-weight: 600;
    }
    
    .latest-temps-caption a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div style="text-align:center; margin:1rem 0; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="daily.html">
      <button type="button" id="goToDailyBtn"> Go to Daily Forecasts </button>
    </a>
  </div>

  <h1 style="text-align:center;"> ⏲️ My Hourly Forecasts 🔮 </h1>

  <p id="currentHourlyDate" style="text-align:center;font-weight:600;margin:0.5rem auto;">
    Forecast date loading...
  </p>

  <p style="text-align:center; margin:0.5rem auto 1rem; color:#000;">
    Cutoff = 30 mins before the hour
    <span class="pt-info">
      ⓘ
      <span class="pt-tooltip"> Hours shown in Eastern Time (ET) </span>
    </span>
  </p>

  <div id="hourSelector" class="hour-selector"></div>

  <form id="hourlyForm">
    <div id="hourlyGrid" class="city-grid"></div>

    <div style="text-align:center;margin:1rem 0;">
      <button type="submit" id="hourlySaveBtn" class="hourly-action-btn" disabled>
        Choose an Hour
      </button>
    </div>
  </form>

  <div id="status" style="text-align:center;margin-top:0.5rem;"></div>

  <div style="text-align:center;margin:1rem 0 0.5rem;">
    <a href="score.html?mode=hourly">
      <button type="button" id="hourlyScoreBtn" class="hourly-action-btn">
        📊 View My Scores
      </button>
    </a>
  </div>

  <script src="script.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const dateEl = document.getElementById('currentHourlyDate');
    if (!dateEl) return;

    const formatDate = () => {
      const raw = (dateEl.textContent || '').trim();
      if (!raw || raw.toLowerCase().includes('loading')) return;

      const parsed = new Date(raw);  // first try native parsing
      if (!Number.isNaN(parsed.getTime())) {
        dateEl.textContent = new Intl.DateTimeFormat('en-GB', {
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        }).format(parsed);
        return;
      }

      const match = raw.match(/^([A-Za-z]{3,9})\s+(\d{1,2}),\s*(\d{4})$/);
      if (match) dateEl.textContent = `${match[2]} ${match[1]} ${match[3]}`;
    };

    formatDate();

    const mo = new MutationObserver(formatDate);  // if script.js sets/updates it later, keep it corrected
    mo.observe(dateEl, { childList: true, characterData: true, subtree: true });
  });
  </script>
</body>
</html>
