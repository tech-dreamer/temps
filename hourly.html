<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourly Forecasts</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    #helpCloseBtn {
      display: none !important;
    }

    /* Match daily "Go to Hourly Forecasts" size */
    #goToDailyBtn {
      padding: 0.8rem 1.3rem;
      background: #9b59b6;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1.1;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    #goToDailyBtn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    /* Make hourly action buttons match daily button sizing/height/line-height */
    .hourly-action-btn {
      white-space: nowrap;
      width: auto;
      min-width: 0;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
      padding: 1rem 2.2rem;
      border-radius: 14px;
      border: none;
      box-sizing: border-box;
    }

    #hourlySaveBtn {
      background: #0096ff;   /* matches daily save look */
      color: #fff;
      border: none;
    }

    #hourlySaveBtn:hover {
      background: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.3);
    }

    #hourlyScoreBtn {
      background: #32cd32;   /* matches daily View My Score */
      color: #fff;
      border: none;
    }

    #hourlyScoreBtn:hover {
      background: #2fb347;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(16, 185, 129, 0.3);
    }
 
    #hourSelector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    #hourSelector .hour-box {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      color: #1e3a8a;
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      margin: 0.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 700;
    }
    
    #hourSelector .hour-box.selected {
      background: #4169E1 !important;
      border-color: #1e40af !important;
      color: #ffffff !important;
      box-shadow: 0 0 0 2px #1e3a8a;
    }

    .latest-temps-caption {
      margin-top: 0.35rem;
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
    }
    
    .latest-temps-caption a {
      color: #1d4ed8;
      text-decoration: underline;
      font-weight: 600;
    }
    
    .latest-temps-caption a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div style="text-align:center; margin:1rem 0; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="daily.html">
      <button type="button" id="goToDailyBtn"> ← Go to Daily Forecasts </button>
    </a>
  </div>

  <h1 style="text-align:center;"> ⏲️ My Hourly Forecasts 🔮 </h1>

  <p id="currentHourlyDate" style="text-align:center;font-weight:600;margin:0.5rem auto;">
    Forecast date loading...
  </p>

  <p style="text-align:center; margin:0.5rem auto 1rem; color:#000;">
    Cutoff = 30 mins before the hour
    <span class="pt-info">
      ⓘ
      <span class="pt-tooltip"> Hours shown in Eastern Time (ET) </span>
    </span>
  </p>

  <div id="hourSelector" class="hour-selector"></div>

  <form id="hourlyForm">
    <div id="hourlyGrid" class="city-grid"></div>

    <div style="text-align:center;margin:1rem 0;">
      <button type="submit" id="hourlySaveBtn" class="hourly-action-btn" disabled>
        Choose an Hour
      </button>
    </div>
  </form>

  <div id="status" style="text-align:center;margin-top:0.5rem;"></div>

  <div style="text-align:center;margin:1rem 0 0.5rem;">
    <a href="score.html?mode=hourly">
      <button type="button" id="hourlyScoreBtn" class="hourly-action-btn">
        📊 View My Scores
      </button>
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
