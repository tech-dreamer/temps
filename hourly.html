<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Hourly Forecasts </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div style="text-align:center; margin:1rem 0; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="daily.html">
      <button type="button"> ← Go to Daily </button>
    </a>

    <a href="score.html?mode=hourly">
      <button type="button"> 📊 View My Hourly Scores </button>
    </a>
  </div>

  <h1 style="text-align:center;"> ⏲️ My Hourly Forecasts 🔮 </h1>

  <p id="currentHourlyDate" style="text-align:center;font-weight:600;margin:0.5rem auto;">
    Forecast date loading...
  </p>

  <!-- Hour Selector -->
  <div id="hourSelector" class="hour-selector"></div>

  <!-- moved Cutoff text below hour selector -->
  <p style="text-align:center; margin:0.5rem auto 1rem; color:#000;">
    Cutoff = 30 mins before the hour
    <span class="pt-info">
      ⓘ
      <span class="pt-tooltip"> Hours shown in Eastern Time (ET) </span>
    </span>
  </p>

  <!-- Forecast Form -->
  <form id="hourlyForm">
    <div id="hourlyGrid" class="city-grid"></div>

    <div style="text-align:center;margin:2rem 0;">
      <button type="submit" id="hourlySaveBtn" disabled style="background:#ffffff;color:#4b5563;border:1px solid #9ca3af;padding:.6rem 1rem;border-radius:.5rem;font-weight:600;cursor:pointer;">
        Choose an Hour
      </button>
    </div>
  </form>

  <!-- Status Messages -->
  <div id="status" style="text-align:center;margin-top:1rem;"></div>

  <script src="script.js"></script>
</body>
</html>
