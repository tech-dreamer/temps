<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Forecast History </title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #3b82f6;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 12px;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff, var(--bg));
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: min(1180px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 1.7rem;
      font-weight: 750;
      letter-spacing: -0.01em;
      color: #111827;
    }

    .subtitle {
      margin: 6px 0 0;
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .status {
      border-left: 4px solid var(--accent);
      background: #eff6ff;
      color: #1d4ed8;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-weight: 600;
      text-align: center;
      line-height: 1.45;
    }

    .status.error {
      background: #fef2f2;
      border-left-color: #ef4444;
      color: #991b1b;
    }

    .status.loading {
      background: #f9fafb;
      border-left-color: #64748b;
      color: #334155;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
      text-align: center;
    }

    .control label {
      font-size: 0.98rem;
      color: #374151;
      font-weight: 700;
      text-align: center;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #111827;
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 1rem;
      outline: none;
      text-align: center;
    }

    input::placeholder,
    select::placeholder {
      text-align: center;
      color: #6b7280;
    }

    input:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 14px;
      font-size: 0.95rem;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
    }

    .button-cozy-blue {
      background: #4169E1;
    }

    .button:hover { filter: brightness(1.03); }

    .button.secondary {
      background: #e5e7eb;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .button.ghost {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-toggle {
      width: 100%;
    }

    .mode-toggle .button {
      flex: 1;
      min-width: 0;
    }

    .mode-toggle .button.active {
      background: #4169E1;
      color: #FFFFFF;
      border: 1px solid transparent;
    }

    .mode-toggle .button:not(.active) {
      background: #e5e7eb;
      color: #000000;
      border: 1px solid #d1d5db;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .table-scroll {
      overflow-x: auto;
      width: 100%;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1080px;
    }

    .history-table.hourly-mode {
      min-width: 860px;
    }

    thead th {
      background: #f8fafc;
      text-align: left;
      font-size: 0.82rem;
      color: #334155;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
      position: relative;
      transition: background-color 0.2s ease;
    }

    th[data-sort] {
      cursor: pointer;
      user-select: none;
    }

    th[data-sort]:hover {
      background: #f1f5f9;
    }

    th[data-sort].active-sort {
      color: #1d4ed8;
      background: #eef7ff;
    }

    th[data-sort].active-sort::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 9999px;
      pointer-events: none;
    }

    th .sort-arrow {
      display: inline-block;
      width: 0.8rem;
      font-size: 0.72rem;
      margin-left: 6px;
      color: #64748b;
    }

    tbody td {
      padding: 11px 12px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
      font-size: 0.94rem;
      color: #1f2937;
    }

    tbody tr:hover td {
      background: #f9fafb;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      padding: 20px 12px;
      font-size: 0.95rem;
      background: #fafafa;
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 0.75 rem;
      flex-direction: column;
      flex-wrap: wrap;
    }

    .pager-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .pager-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .button-cozy-purple {
      background-color: #CF9FFF;
    }

    .footer-row {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .accuracy-cell {
      white-space: nowrap;
    }
    
    .history-table th.accuracy-col,
    .history-table td.accuracy-cell {
      width: 125px;
      min-width: 125px;
    }

    .history-table.daily-mode th.color-col,
    .history-table.daily-mode td.color-cell {
      text-align: center;
      width: 58px;
      min-width: 58px;
      white-space: nowrap;
    }

    .accuracy-dot {
      width: 0.85rem;
      height: 0.85rem;
      border-radius: 9999px;
      display: inline-block;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      vertical-align: middle;
    }

    .accuracy-dot.green { background: #10b981; }
    .accuracy-dot.yellow { background: #facc15; }
    .accuracy-dot.red { background: #ef4444; }
    .accuracy-dot.gray { background: #9ca3af; }

    .mode-daily-col {
      display: table-cell;
    }

    .source-wrap {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      padding-left: 2px;
      padding-right: 2px;
    }

    .source-line {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
      text-align: left;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .source-line .source-label {
      color: #334155;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-right: 0.35rem;
      text-transform: uppercase;
      font-size: 0.72rem;
    }

    .source-line a {
      color: #3b82f6;
      text-decoration: none;
      border-bottom: 1px dotted rgba(59, 130, 246, 0.45);
      padding-bottom: 1px;
    }

    .source-line a:hover {
      color: #1e40af;
      border-bottom-color: rgba(30, 64, 175, 0.75);
    }

    .history-table thead th.accuracy-col,
    .history-table thead th.color-col,
    .history-table thead th.coins-col,
    .history-table thead th.mood-col,
    .history-table tbody td.accuracy-cell,
    .history-table tbody td.color-cell,
    .history-table tbody td.coins-col,
    .history-table tbody td.mood-col,
    .history-table tbody td.coins-cell,
    .history-table tbody td.mood-cell,
    .history-table td.coins-col > *,
    .history-table td.mood-col > * {
      text-align: center !important;
      vertical-align: middle !important;
    }

    @media (max-width: 960px) {
      .controls {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }
      .title {
        font-size: 1.45rem;
      }
    }

    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }
      .pager {
        justify-content: center;
        text-align: center;
      }
      .footer-row { justify-content: stretch; }
      .footer-row .button { width: 100%; }
      .btn-group { width: 100%; }
      .btn-group .button { flex: 1; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1 class="title"> 📖 My Forecast History </h1>
      <p class="subtitle"> Filter, search, sort, and paginate my forecasts </p>
    </header>

    <section class="card">
      <div id="status" class="status loading"> Loading my forecast history… </div>

      <div class="controls">
        <div class="control">
          <label> Forecast Type </label>
          <div class="btn-group mode-toggle">
            <button id="dailyModeBtn" class="button active" type="button"> Daily </button>
            <button id="hourlyModeBtn" class="button secondary" type="button"> Hourly </button>
          </div>
        </div>

        <div class="control">
          <label for="searchInput"> Search </label>
          <input id="searchInput" type="text" placeholder=" City or Date ">
        </div>

        <div class="control">
          <label for="cityFilter">City</label>
          <select id="cityFilter">
            <option value=""> All Cities </option>
          </select>
        </div>

        <div class="control">
          <label for="fromDate"> From date </label>
          <input id="fromDate" type="text" placeholder="DD-MM-YYYY" maxlength="10" inputmode="numeric">
        </div>

        <div class="control">
          <label for="toDate"> To date </label>
          <input id="toDate" type="text" placeholder="DD-MM-YYYY" maxlength="10" inputmode="numeric">
        </div>

        <div class="control">
          <label for="pageSize">Rows / page</label>
          <select id="pageSize">
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </div>

        <div class="control">
          <label>&nbsp;</label>
          <div class="btn-group">
            <button id="clearBtn" class="button ghost" type="button"> Clear Filters </button>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table id="historyTable" class="history-table">
            <thead>
              <tr>
                <th data-sort="date" data-label="Date"> Date <span class="sort-arrow"></span></th>
                <th data-sort="city" data-label="City"> City <span class="sort-arrow"></span></th>
                <th data-sort="forecast" data-label="Forecast"> Forecast <span class="sort-arrow"></span></th>
                <th data-sort="actual" data-label="Actual"> Actual <span class="sort-arrow"></span></th>
                <th data-sort="accuracy" data-label="Accuracy (Error)" class="accuracy-col"> Accuracy (Error) <span class="sort-arrow"></span></th>
                <th data-sort="color" data-label="Color" class="color-col mode-daily-col"> Color Score <span class="sort-arrow"></span></th>
                <th data-sort="coins" data-label="Coins" class="coins-col"> Coins <span class="sort-arrow"></span></th>
                <th data-sort="mood" data-label="Mood" class="mood-col mode-daily-col"> Mood <span class="sort-arrow"></span></th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>

      <div class="source-wrap">
        <div id="historySourceLine" class="source-line">Sources:</div>
      </div>

      <div class="pager">
        <span id="pagerInfo" class="meta"> 0 entries </span>
        <div class="pager-bottom">
          <button id="goDailyBtn" class="button button-cozy-purple" type="button"> Go to Daily </button>
          <div class="pager-actions">
            <button id="prevPage" class="button secondary" type="button"> Previous </button>
            <button id="nextPage" class="button secondary" type="button"> Next </button>
            <button id="statsBtn" class="button button-cozy-blue" type="button"> My Stats </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = 'https://ckyqknlxmjqlkqnxhgef.supabase.co';
    const SUPABASE_PUB_KEY = "sb_publishable_lQ27fzzwJf27dUWPEW8UQA_NTY7naO6";
    if (!window.__supabase_client) {
      window.__supabase_client = createClient(SUPABASE_URL, SUPABASE_PUB_KEY);
    }
    const client = window.__supabase_client;

    const statusEl = document.getElementById("status");
    const subtitleEl = document.querySelector(".subtitle");

    const searchInput = document.getElementById("searchInput");
    const cityFilter = document.getElementById("cityFilter");
    const fromDateInput = document.getElementById("fromDate");
    const toDateInput = document.getElementById("toDate");
    const pageSizeInput = document.getElementById("pageSize");
    const clearBtn = document.getElementById("clearBtn");
    const statsBtn = document.getElementById("statsBtn");
    const goDailyBtn = document.getElementById("goDailyBtn");

    const dailyModeBtn = document.getElementById("dailyModeBtn");
    const hourlyModeBtn = document.getElementById("hourlyModeBtn");

    const prevPageBtn = document.getElementById("prevPage");
    const nextPageBtn = document.getElementById("nextPage");
    const pagerInfo = document.getElementById("pagerInfo");
    const tbody = document.getElementById("historyBody");
    const table = document.getElementById("historyTable");
    const tableHeaders = document.querySelectorAll("th[data-sort]");
    const dateHeader = document.querySelector('th[data-sort="date"]');
    const modeDailyCols = document.querySelectorAll(".mode-daily-col");

    const modeConfig = {
      daily: {
        table: "daily_scores",
        label: "Daily",
        dateLabel: "Date",
        hasHour: false,
        select: "*"
      },
      hourly: {
        table: "hourly_scores",
        label: "Hourly",
        dateLabel: "Date & Hour",
        hasHour: true,
        select: "*"
      }
    };

    const defaultSortDirection = {
      date: "desc",
      city: "asc",
      forecast: "desc",
      actual: "desc",
      accuracy: "desc",
      color: "asc",
      coins: "desc",
      mood: "desc"
    };

    const MONTH_NAMES = [
      "Jan", "Feb", "Mar", "Apr", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec"
    ];

    const state = {
      mode: "daily",
      rows: [],
      filteredRows: [],
      sortBy: "date",
      sortDir: "desc",
      page: 1,
      pageSize: 50
    };

    const SOURCES_BY_MODE = {
      daily: [
        { name: "Los Angeles", url: "https://forecast.weather.gov/product.php?site=LOX&product=CLI&issuedby=LAX" },
        { name: "Houston", url: "https://forecast.weather.gov/product.php?site=NWS&product=CLI&issuedby=HOU" },
        { name: "New York City", url: "https://forecast.weather.gov/product.php?site=NWS&product=CLI&issuedby=NYC" }
      ],
      hourly: [
        { name: "Los Angeles", url: "https://weather.gov/wrh/timeseries?site=KLAX&hourly=true" },
        { name: "Houston", url: "https://weather.gov/wrh/timeseries?site=KHOU&hourly=true" },
        { name: "New York City", url: "https://weather.gov/wrh/timeseries?site=KNYC" }
      ]
    };

    function modeConfigFor(mode) {
      return modeConfig[mode] || modeConfig.daily;
    }

    function setStatus(msg, type = "default") {
      statusEl.textContent = msg;
      if (type === "error") statusEl.className = "status error";
      else if (type === "loading") statusEl.className = "status loading";
      else statusEl.className = "status";
    }

    function getFirstNumber(row, keys) {
      for (const key of keys) {
        const n = toNumber(row[key]);
        if (n !== null) return n;
      }
      return null;
    }

    function getForecastHigh(row) {
      return getFirstNumber(row, ["forecast_high", "forecast"]);
    }

    function getForecastLow(row) {
      return getFirstNumber(row, ["forecast_low"]);
    }

    function getActualHigh(row) {
      return getFirstNumber(row, ["actual_high", "actual"]);
    }

    function getActualLow(row) {
      return getFirstNumber(row, ["actual_low"]);
    }

    function getErrorPrimary(row, isHourly = false) {
      const keys = isHourly ? ["error"] : ["error_high"];
      for (const key of keys) {
        const n = toNumber(row?.[key]);
        if (n !== null) return n;
      }
      return null;
    }

    function getErrorLow(row) {
      return getFirstNumber(row, ["error_low"]);
    }

    function formatInt(v) {
      const n = toNumber(v);
      if (n === null) return "—";
      return `${Math.round(n)}`;
    }

    function formatAbsError(v) {
      const n = toNumber(v);
      if (n === null) return "—";
      return `${Math.abs(Math.round(n))}`;
    }

    function formatIntWithDegree(v) {
      const n = toNumber(v);
      if (n === null) return "—";
      return `${Math.round(n)}°`;
    }

    function formatAbsErrorWithDegree(v) {
      const n = toNumber(v);
      if (n === null) return "—";
      return `${Math.abs(Math.round(n))}°`;
    }

    function formatRange(row, isForecast = true) {
      const high = isForecast ? getForecastHigh(row) : getActualHigh(row);
      const low = isForecast ? getForecastLow(row) : getActualLow(row);
      const isHourly = modeConfigFor(state.mode).hasHour;

      if (isHourly) {
        return high === null ? "—" : formatIntWithDegree(high);
      }

      if (high === null && low === null) return "—";
      const highText = high === null ? "—" : formatIntWithDegree(high);
      const lowText = low === null ? "—" : formatIntWithDegree(low);
      return `H ${highText} / L ${lowText}`;
    }

    function parseDateValue(value) {
      if (!value) return 0;

      const s = String(value).trim();

      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);  // parse YYYY-MM-DD safely
      if (m) {
        const year = Number(m[1]);
        const monthIndex = Number(m[2]) - 1;
        const day = Number(m[3]);
        return Date.UTC(year, monthIndex, day, 12, 0, 0);
      }

      return Date.parse(s) || 0;
    }

    function parseFilterDate(value) {
      if (!value) return null;
      const s = String(value).trim();
      if (!s) return null;
    
      let m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);  // DD-MM-YYYY
      if (m) {
        const day = Number(m[1]);
        const month = Number(m[2]);
        const year = Number(m[3]);
    
        if (!Number.isFinite(day) || !Number.isFinite(month) || !Number.isFinite(year)) return null;
    
        const d = new Date(Date.UTC(year, month - 1, day, 12, 0, 0));
        if (d.getUTCMonth() !== month - 1 || d.getUTCDate() !== day || d.getUTCFullYear() !== year) return null;
        return d.getTime();
      }
    
      const parsed = Date.parse(s);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function makeHourInfo(hour, isSixHourHigh = false, sortMinuteOffset = 0) {
      if (typeof hour !== "number" || !Number.isFinite(hour)) return null;
      const normalizedHour = Math.trunc(hour);
      if (normalizedHour < 0 || normalizedHour > 23) return null;
      return { hour: normalizedHour, isSixHourHigh, sortMinuteOffset };
    }

    function parseHourInfo(raw) {
      if (raw === null || raw === undefined) return null;
      const s = String(raw).trim();
      if (!s) return null;

      const eps = 1e-9;
      const asNumber = Number(s);
      if (Number.isFinite(asNumber)) {
        const h = Math.trunc(asNumber);
        const frac = asNumber - h;
        const isSixHourHigh = Math.abs(frac - 0.5) < eps;
        return makeHourInfo(h, isSixHourHigh, isSixHourHigh ? 30 : 0);
      }

      const m = s.match(/^(\d{1,2})(?::(\d{1,2}))?\s*(am|pm)?$/i);
      if (m) {
        const baseHourRaw = Number(m[1]);
        const minuteRaw = Number(m[2] || 0);
        if (!Number.isFinite(baseHourRaw) || baseHourRaw < 0 || baseHourRaw > 23) return null;
        if (!Number.isFinite(minuteRaw) || minuteRaw < 0 || minuteRaw > 59) return null;

        const ampm = (m[3] || "").toLowerCase();
        let h = baseHourRaw;
        if (ampm === "pm" && h < 12) h += 12;
        if (ampm === "am" && h === 12) h = 0;

        const isSixHourHigh = minuteRaw === 30;
        return makeHourInfo(h, isSixHourHigh, isSixHourHigh ? 30 : 0);
      }

      const ts = Date.parse(s);
      if (Number.isNaN(ts)) return null;
      const dt = new Date(ts);
      const mns = dt.getMinutes();
      const isSixHourHigh = mns === 30;
      return makeHourInfo(dt.getHours(), isSixHourHigh, isSixHourHigh ? 30 : 0);
    }

    function parseHourValue(raw) {
      const info = parseHourInfo(raw);
      return info ? info.hour : null;
    }

    function autoFormatDateInputValue(inputEl) {
      const digits = inputEl.value.replace(/\D/g, "").slice(0, 8);  // keep only digits, max 8
      let formatted = digits;
    
      if (digits.length > 2) {
        formatted = `${digits.slice(0, 2)}-${digits.slice(2)}`;
      }
      if (digits.length > 4) {
        formatted = `${digits.slice(0, 2)}-${digits.slice(2, 4)}-${digits.slice(4, 8)}`;
      }
    
      inputEl.value = formatted;
    }

    function formatDateDDMMYYYY(value) {
      const t = parseDateValue(value);
      if (!Number.isFinite(t)) return "—";

      const d = new Date(t);
      const day = d.getUTCDate();
      const month = MONTH_NAMES[d.getUTCMonth()] || "—";
      const year = d.getUTCFullYear();

      return `${day} ${month} ${year}`;
    }

    function formatHourLabel(hour24) {
      const h = hour24 % 12 || 12;
      const ap = hour24 >= 12 ? "PM" : "AM";
      return `${h} ${ap}`;
    }

    function formatDisplayDate(row, hasHour = false, hourParser = parseHourInfo) {
      if (!row?.date) return "—";
    
      const t = parseDateValue(row.date);
      if (!Number.isFinite(t)) return String(row.date);
    
      const dateText = formatDateDDMMYYYY(row.date);
    
      if (!hasHour) return `${dateText}`;
    
      const hourInfo = typeof hourParser === "function" ? hourParser(row.hour) : null;
      if (!hourInfo) return `${dateText} ET`;
    
      return `${dateText}, ${formatHourLabel(hourInfo.hour)} ET${hourInfo.isSixHourHigh ? " 6-hr high" : ""}`;
    }

    function accuracyColor(value) {
      const n = toNumber(value);
      if (n === null) return "gray";
      const abs = Math.abs(n);
      if (abs < 2) return "green";
      if (abs < 4) return "yellow";
      return "red";
    }

    function accuracyRank(value) {
      const c = accuracyColor(value);
      if (c === "green") return 0;
      if (c === "yellow") return 1;
      if (c === "red") return 2;
      return 3;
    }

    function formatAccuracy(row) {
      const primary = getErrorPrimary(row, state.mode === "hourly");
      const secondary = getErrorLow(row);
      const isHourly = modeConfigFor(state.mode).hasHour;

      if (primary === null && secondary === null) return "—";
      if (isHourly || secondary === null) return primary === null ? "—" : formatAbsErrorWithDegree(primary);

      const primaryText = primary === null ? "—" : formatAbsErrorWithDegree(primary);
      const secondaryText = secondary === null ? "—" : formatAbsErrorWithDegree(secondary);
      return `H ${primaryText} / L ${secondaryText}`;
    }

    function dateSortValue(row) {
      const base = parseDateValue(row.date);
      if (base === 0) return 0;
      const cfg = modeConfigFor(state.mode);
      if (!cfg.hasHour) return base;

      const hourInfo = parseHourInfo(row.hour);
      if (!hourInfo) return base;

      const d = new Date(base);
      d.setHours(hourInfo.hour, hourInfo.sortMinuteOffset, 0, 0);
      return d.getTime();
    }

    function getForecastValueForSort(row) {
      const high = getForecastHigh(row);
      const low = getForecastLow(row);
      const isHourly = modeConfigFor(state.mode).hasHour;

      if (isHourly) return high;
      if (high === null && low === null) return null;
      if (low === null) return high;
      return (high + low) / 2;
    }

    function getActualValueForSort(row) {
      const high = getActualHigh(row);
      const low = getActualLow(row);
      const isHourly = modeConfigFor(state.mode).hasHour;

      if (isHourly) return high;
      if (high === null && low === null) return null;
      if (low === null) return high;
      return (high + low) / 2;
    }

    function toNumber(v) {
      if (v === null || v === undefined || v === "") return null;
      if (typeof v === "number") return Number.isFinite(v) ? v : null;
      const s = String(v).trim();
      const match = s.match(/[-+]?\d+(?:[.,]\d+)?/);
      if (!match) return null;
      const n = Number(match[0].replace(",", "."));
      return Number.isFinite(n) ? n : null;
    }

    function sortRows(list) {
      const dir = state.sortBy && state.sortDir === "asc" ? 1 : -1;
      const key = state.sortBy;

      return list.sort((a, b) => {
        let aV, bV;

        if (key === "date") {
          aV = dateSortValue(a);
          bV = dateSortValue(b);
          if (aV === bV) return String(a.id).localeCompare(String(b.id)) * dir;
          return (aV > bV ? 1 : -1) * dir;
        }

        if (key === "city") {
          aV = (a.city_name || "").toLowerCase();
          bV = (b.city_name || "").toLowerCase();
          if (aV === bV) return 0;
          return (aV > bV ? 1 : -1) * dir;
        }

        if (key === "forecast") {
          const aForecast = getForecastValueForSort(a);
          const bForecast = getForecastValueForSort(b);
          if (aForecast === null && bForecast === null) return 0;
          if (aForecast === null) return 1;
          if (bForecast === null) return -1;
          if (aForecast === bForecast) return 0;
          return (aForecast > bForecast ? 1 : -1) * dir;
        }

        if (key === "actual") {
          const aActual = getActualValueForSort(a);
          const bActual = getActualValueForSort(b);
          if (aActual === null && bActual === null) return 0;
          if (aActual === null) return 1;
          if (bActual === null) return -1;
          if (aActual === bActual) return 0;
          return (aActual > bActual ? 1 : -1) * dir;
        }

        if (key === "accuracy") {
          aV = getErrorPrimary(a, state.mode === "hourly");
          bV = getErrorPrimary(b, state.mode === "hourly");
          if (aV === null && bV === null) return 0;
          if (aV === null) return 1;
          if (bV === null) return -1;
          if (Math.abs(aV) === Math.abs(bV)) return 0;
          return (Math.abs(aV) > Math.abs(bV) ? 1 : -1) * dir;
        }

        if (key === "color") {
          aV = accuracyRank(getErrorPrimary(a));
          bV = accuracyRank(getErrorPrimary(b));
          if (aV === bV) return 0;
          return (aV > bV ? 1 : -1) * dir;
        }

        if (key === "coins") {
          aV = toNumber(a.coins);
          bV = toNumber(b.coins);
          if (aV === null && bV === null) return 0;
          if (aV === null) return 1;
          if (bV === null) return -1;
          if (aV === bV) return 0;
          return (aV > bV ? 1 : -1) * dir;
        }

        if (key === "mood") {
          aV = (a.mood || "").toLowerCase();
          bV = (b.mood || "").toLowerCase();
          if (aV === bV) return 0;
          return (aV > bV ? 1 : -1) * dir;
        }

        return 0;
      });
    }

    function buildCityOptions() {
      const current = cityFilter.value;
      const names = [...new Set(state.rows.map(r => r.city_name || "Unknown"))].sort((a, b) => a.localeCompare(b));
      cityFilter.innerHTML = '<option value=""> All Cities </option>';
      names.forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        cityFilter.appendChild(opt);
      });
      if (names.includes(current)) cityFilter.value = current;
      else cityFilter.value = "";
    }

    function visibleColumnCount() {
      return state.mode === "daily" ? 8 : 6;
    }

    function applyModeColumns() {
      const isDaily = state.mode === "daily";
      modeDailyCols.forEach((col) => {
        col.style.display = isDaily ? "table-cell" : "none";
      });

      if (table) {
        table.classList.toggle("hourly-mode", !isDaily);
        table.classList.toggle("daily-mode", isDaily);
      }
    }

    function applyFilters(resetPage = true) {
      if (resetPage) state.page = 1;

      const query = searchInput.value.trim().toLowerCase();
      const city = cityFilter.value;
      const fromVal = fromDateInput.value;
      const toVal = toDateInput.value;

      let filtered = [...state.rows];

      if (city) {
        filtered = filtered.filter((row) => (row.city_name || "Unknown") === city);
      }

      if (fromVal || toVal) {
        const fromTs = fromVal ? parseFilterDate(fromVal) : null;
        const toTs = toVal ? parseFilterDate(toVal) : null;

        filtered = filtered.filter((row) => {
          const t = parseDateValue(row.date);
          if (t === 0) return false;
          if (fromTs !== null && t < fromTs) return false;
          if (toTs !== null && t > toTs) return false;
          return true;
        });
      }

      if (query) {
        filtered = filtered.filter((row) => {
          const rowText = [
            formatDisplayDate(row, modeConfigFor(state.mode).hasHour),
            row.city_name || "",
            formatRange(row, true),
            formatRange(row, false),
            formatAccuracy(row),
            row.mood || "",
            row.hour || "",
            toNumber(row.coins)
          ].join(" ").toLowerCase();

          return rowText.includes(query);
        });
      }

      state.filteredRows = sortRows(filtered);
      updateSortIndicators();
      renderRows();
      updatePager();
    }

    function updateSortIndicators() {
      tableHeaders.forEach((th) => {
        th.classList.remove("active-sort");
        const arrow = th.querySelector(".sort-arrow");
        if (arrow) arrow.textContent = "";
      });

      const active = document.querySelector(`th[data-sort="${state.sortBy}"]`);
      if (active) {
        active.classList.add("active-sort");
        const arrow = active.querySelector(".sort-arrow");
        if (arrow) arrow.textContent = state.sortDir === "asc" ? "▲" : "▼";
      }
    }

    function renderRows() {
      tbody.innerHTML = "";

      const pageSize = state.pageSize;
      const total = state.filteredRows.length;
      const totalPages = Math.max(1, Math.ceil(total / pageSize));

      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * pageSize;
      const end = Math.min(start + pageSize, total);
      const pageRows = state.filteredRows.slice(start, end);

      if (!pageRows.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "empty";
        td.colSpan = visibleColumnCount();
        td.textContent = total === 0 ? "No matching records found" : "No records on this page";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      pageRows.forEach((row) => {
        const tr = document.createElement("tr");

        const tdDate = document.createElement("td");
        tdDate.textContent = formatDisplayDate(row, modeConfigFor(state.mode).hasHour);

        const tdCity = document.createElement("td");
        tdCity.textContent = row.city_name || "Unknown";

        const tdForecast = document.createElement("td");
        tdForecast.textContent = formatRange(row, true);

        const tdActual = document.createElement("td");
        tdActual.textContent = formatRange(row, false);

        const tdAccuracy = document.createElement("td");
        tdAccuracy.className = "accuracy-cell accuracy-col";
        tdAccuracy.textContent = formatAccuracy(row);

        const tdCoins = document.createElement("td");
        tdCoins.className = "coins-col";
        tdCoins.textContent = formatInt(row.coins);

        tr.appendChild(tdDate);
        tr.appendChild(tdCity);
        tr.appendChild(tdForecast);
        tr.appendChild(tdActual);
        tr.appendChild(tdAccuracy);

        if (state.mode === "daily") {
          const tdColor = document.createElement("td");
          tdColor.className = "color-cell color-col";
          const err = getErrorPrimary(row);
          const color = accuracyColor(err);
          const dot = document.createElement("span");
          dot.className = `accuracy-dot ${color}`;
          dot.title = err === null ? "No error data" : `Error: ${formatAbsErrorWithDegree(err)}`;
          tdColor.appendChild(dot);
          tr.appendChild(tdColor);
        }

        tr.appendChild(tdCoins);

        if (state.mode === "daily") {
          const tdMood = document.createElement("td");
          tdMood.className = "mood-col";
          tdMood.textContent = row.mood || "—";
          tr.appendChild(tdMood);
        }

        tbody.appendChild(tr);
      });
    }

    function renderSourceLine(mode = state.mode) {
      const box = document.getElementById("historySourceLine");
      if (!box) return;

      const list = SOURCES_BY_MODE[mode] || [];
      const links = list.map(s =>
        `<a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.name}</a>`
      );
      const label = mode === "hourly" ? "Hourly Sources:" : "Daily Sources:";
      box.innerHTML = `<span class="source-label">${label}</span> ${links.join(", ") || "—"}`;
    }

    function updatePager() {
      const total = state.filteredRows.length;
      const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
      const start = total === 0 ? 0 : (state.page - 1) * state.pageSize + 1;
      const end = total === 0 ? 0 : Math.min(start + state.pageSize - 1, total);

      pagerInfo.textContent = total === 0
        ? "0 entries"
        : `Showing ${start}-${end} of ${total} entries`;

      prevPageBtn.disabled = state.page <= 1;
      nextPageBtn.disabled = state.page >= totalPages;
    }

    function updateDateHeaderLabel() {
      const cfg = modeConfigFor(state.mode);
      dateHeader.innerHTML = `${cfg.dateLabel} <span class="sort-arrow"></span>`;
      subtitleEl.textContent = `Filter, search, sort, and paginate my ${cfg.label.toLowerCase()} forecasts.`;
      updateSortIndicators();
    }

    function setModeStyles() {
      const isDaily = state.mode === "daily";
      dailyModeBtn.classList.toggle("active", isDaily);
      hourlyModeBtn.classList.toggle("active", !isDaily);
      dailyModeBtn.classList.toggle("secondary", !isDaily);
      hourlyModeBtn.classList.toggle("secondary", isDaily);
    }

    async function resolveAuthUserId() {
      const { data: sessionData, error: sessionError } = await client.auth.getSession();
      if (sessionError) throw new Error(`Session check failed: ${sessionError.message}`);

      if (sessionData?.session?.user?.id) return sessionData.session.user.id;

      const { data: anonData, error: anonError } = await client.auth.signInAnonymously();
      if (anonError) throw new Error(`Anonymous sign-in failed: ${anonError.message}`);

      const anonUser = anonData?.user ?? anonData?.session?.user;
      if (!anonUser?.id) throw new Error("Could not determine authenticated user after anonymous sign-in");

      return anonUser.id;
    }

    async function loadData() {
      let userId;
      try {
        setStatus("Authenticating...", "loading");
        userId = await resolveAuthUserId();
      } catch (err) {
        setStatus(`Authentication error: ${err.message}`, "error");
        tbody.innerHTML = "";
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "empty";
        td.colSpan = visibleColumnCount();
        td.textContent = "Could not authenticate user.";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      setStatus("Loading forecast history...", "loading");
      renderSourceLine(state.mode);

      const cfg = modeConfigFor(state.mode);
      state.page = 1;
      state.sortBy = "date";
      state.sortDir = "desc";

      const [scoreResult, cityResult] = await Promise.all([
        client.from(cfg.table).select(cfg.select).eq("user_id", userId).order("date", { ascending: false }),
        client.from("cities").select("id,name")
      ]);

      if (scoreResult.error) {
        setStatus(`Failed to load ${cfg.label.toLowerCase()} scores: ${scoreResult.error.message}`, "error");
        tbody.innerHTML = "";
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.className = "empty";
        td.colSpan = visibleColumnCount();
        td.textContent = `Could not load ${cfg.label.toLowerCase()} history.`;
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      const cityRows = cityResult.error ? [] : (cityResult.data || []);
      const cityMap = new Map();
      cityRows.forEach((c) => {
        cityMap.set(String(c.id), c.name || "Unknown");
      });

      state.rows = (scoreResult.data || []).map((r) => ({
        ...r,
        city_name: cityMap.get(String(r.city_id)) || "Unknown"
      }));

      buildCityOptions();
      state.filteredRows = [...state.rows];
      setStatus(`Loaded ${state.rows.length} ${cfg.label.toLowerCase()} record(s)`, "default");
      state.page = 1;
      state.pageSize = parseInt(pageSizeInput.value, 10) || 50;
      applyFilters(false);
      updatePager();
      updateSortIndicators();
    }

    function setMode(mode) {
      if (state.mode === mode) return;
      state.mode = mode;
      applyModeColumns();
      setModeStyles();
      updateDateHeaderLabel();
      renderSourceLine(mode);
      loadData();
    }

    tableHeaders.forEach((th) => {
      th.addEventListener("click", () => {
        const key = th.dataset.sort;

        if (state.mode === "hourly" && (key === "color" || key === "mood")) return;

        if (state.sortBy === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortBy = key;
          state.sortDir = defaultSortDirection[key] || "desc";
        }
        applyFilters(false);
      });
    });

    dailyModeBtn.addEventListener("click", () => setMode("daily"));
    hourlyModeBtn.addEventListener("click", () => setMode("hourly"));

    searchInput.addEventListener("input", () => applyFilters());
    cityFilter.addEventListener("change", () => applyFilters());
    fromDateInput.addEventListener("input", (e) => {
      autoFormatDateInputValue(e.target);
      applyFilters();
    });
    toDateInput.addEventListener("input", (e) => {
      autoFormatDateInputValue(e.target);
      applyFilters();
    });

    pageSizeInput.addEventListener("change", () => {
      state.pageSize = parseInt(pageSizeInput.value, 10) || 50;
      state.page = 1;
      applyFilters(false);
      updatePager();
    });

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      cityFilter.value = "";
      fromDateInput.value = "";
      toDateInput.value = "";
      pageSizeInput.value = "50";
      state.pageSize = 50;
      applyFilters(true);
    });

    goDailyBtn.addEventListener("click", () => {
      window.location.href = "daily.html";
    });

    prevPageBtn.addEventListener("click", () => {
      if (state.page > 1) {
        state.page--;
        renderRows();
        updatePager();
      }
    });

    nextPageBtn.addEventListener("click", () => {
      const totalPages = Math.max(1, Math.ceil(state.filteredRows.length / state.pageSize));
      if (state.page < totalPages) {
        state.page++;
        renderRows();
        updatePager();
      }
    });

    statsBtn.addEventListener("click", () => {
      window.location.href = "stats.html";
    });

    state.pageSize = parseInt(pageSizeInput.value, 10) || 50;
    applyModeColumns();
    setModeStyles();
    updateDateHeaderLabel();
    renderSourceLine(state.mode);
    loadData();
  </script>
</body>
</html>
